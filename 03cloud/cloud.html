<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私有云盘</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <style>
        :root {
            --bg-main: #0d1117; 
            --bg-card: #161b22; 
            --bg-input: #21262d; 
            --border-color: #30363d; 
            --text-main: #c9d1d9; 
            --text-muted: #8b949e; 
            --accent-color: #58a6ff; 
            --font-mono: 'Fira Code', 'Ubuntu Mono', monospace;
        }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: sans-serif, var(--font-mono); }
        
        .el-table { 
            --el-table-bg-color: var(--bg-card); 
            --el-table-tr-bg-color: var(--bg-card); 
            --el-table-header-bg-color: var(--bg-input); 
            --el-table-text-color: var(--text-main); 
            --el-table-header-text-color: #ffffff; 
            --el-table-border-color: var(--border-color); 
            --el-table-row-hover-bg-color: #2c3138; 
        }
        .el-card { --el-card-bg-color: var(--bg-card); border-color: var(--border-color); color: var(--text-main); }
        
        /* 🚀 修复核心：强制重置上传组件的宽高与点击层级，确保弹窗能够百分百触发 */
        .el-upload { display: block; width: 100%; }
        .el-upload-dragger { width: 100% !important; background-color: var(--bg-input) !important; border-color: var(--border-color) !important; transition: all 0.2s; position: relative; z-index: 10; }
        .el-upload-dragger:hover { border-color: var(--accent-color) !important; }
        .el-upload-dragger .el-upload__text { color: var(--text-muted) !important; }
        .el-upload-dragger .el-upload__text em { color: var(--accent-color) !important; }
        .el-icon--upload { color: var(--text-muted) !important; }
        
        .storage-track { height: 6px; background-color: var(--bg-input); border-radius: 9999px; overflow: hidden; border: 1px solid var(--border-color); }
        .storage-bar { height: 100%; background-color: var(--accent-color); border-radius: 9999px; transition: width 0.3s ease; box-shadow: 0 0 8px rgba(88,166,255,0.5); }
        
        .ctrl-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 5px 12px; font-size: 12px; cursor: pointer; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-family: var(--font-mono); transition: all 0.2s; }
        .ctrl-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-800">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                📂 私有终端云 <span class="text-sm bg-purple-600 text-white px-2 py-0.5 rounded" style="background:#8957e54d; color:#a371f7; border: 1px solid #8957e54d;">D1 + R2</span>
            </h1>
            
            <div class="flex items-center gap-2">
                <button class="ctrl-btn" style="color: #2ea44f; border-color: rgba(46,164,79,0.3);" @click="fetchFiles">
                    <i class="fas fa-sync-alt" :class="{'fa-spin': loading}"></i> 刷新数据
                </button>
                <button class="ctrl-btn" style="color: #58a6ff; border-color: rgba(88,166,255,0.3);" @click="goHome">
                    <i class="fas fa-home"></i> 回首页
                </button>
                <button class="ctrl-btn" @click="logout">
                    <i class="fas fa-power-off"></i> [ {{ username }} ] 注销
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="md:col-span-1 flex flex-col gap-4">
                <el-card shadow="never">
                    <template #header><span class="font-bold text-white font-mono">// UPLOAD_ASSET</span></template>
                    <el-upload
                        class="upload-demo"
                        drag
                        action="#"
                        :http-request="customUpload"
                        :show-file-list="false"
                        multiple>
                        <i class="fas fa-cloud-upload-alt el-icon--upload" style="font-size: 40px; margin-bottom: 10px;"></i>
                        <div class="el-upload__text text-sm">
                            拖拽资产到此终端，或 <em>点击上传</em>
                        </div>
                    </el-upload>
                </el-card>

                <el-card shadow="never">
                    <template #header><span class="font-bold text-white font-mono">// STORAGE_MONITOR</span></template>
                    <div class="text-sm">
                        <div class="flex justify-between items-center mb-2 font-mono">
                            <span class="text-gray-400">已用: {{ usedSizeFormatted }}</span>
                            <span class="text-accent-color font-bold">{{ storagePercentage }}%</span>
                        </div>
                        <div class="storage-track">
                            <div class="storage-bar" :style="{ width: storagePercentage + '%' }"></div>
                        </div>
                        <div class="flex justify-between text-xs text-gray-500 mt-2 font-mono">
                            <span>0 B</span>
                            <span>MAX: 10 GB</span>
                        </div>
                    </div>
                </el-card>
            </div>

            <div class="md:col-span-3">
                <el-table :data="files" v-loading="loading" style="width: 100%" border empty-text="[ DATA_NOT_FOUND ] 当前终端无存储资产">
                    <el-table-column prop="file_name" label="资源名称" min-width="180" show-overflow-tooltip>
                        <template #default="scope">
                            <i class="far fa-file-alt mr-2 text-gray-500"></i>
                            <span class="text-white font-medium">{{ scope.row.file_name }}</span>
                        </template>
                    </el-table-column>
                    <el-table-column label="体积" width="120">
                        <template #default="scope"><span class="font-mono text-gray-400">{{ formatSize(scope.row.file_size) }}</span></template>
                    </el-table-column>
                    <el-table-column label="入库时间" width="180">
                        <template #default="scope"><span class="font-mono text-gray-400">{{ formatDate(scope.row.created_at) }}</span></template>
                    </el-table-column>
                    <el-table-column label="终端指令" width="160" align="center">
                        <template #default="scope">
                            <div class="flex justify-center gap-2">
                                <button class="ctrl-btn" style="padding: 3px 8px; border-color: rgba(46,164,79,0.4); color: #2ea44f;" @click="downloadFile(scope.row.id)" title="下载"><i class="fas fa-download"></i></button>
                                <button class="ctrl-btn" style="padding: 3px 8px; border-color: rgba(248,81,73,0.4); color: #f85149;" @click="deleteFile(scope.row.id)" title="删除"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </template>
                    </el-table-column>
                </el-table>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;
        const { ElMessage, ElMessageBox } = ElementPlus;

        createApp({
            setup() {
                // 1. 优先加载工具函数，防止作用域错误导致 Vue 挂载崩溃
                const getAuthHeaders = () => {
                    const token = localStorage.getItem('nav_token');
                    return token ? { 'Authorization': `Bearer ${token}` } : {};
                };

                const formatSize = (bytes) => {
                    if (!bytes) return "0 B";
                    const k = 1024;
                    const sizes = ["B", "KB", "MB", "GB"];
                    const i = Math.floor(Math.log(bytes) / Math.log(k));
                    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
                };

                const formatDate = (dateStr) => {
                    if (!dateStr) return "-";
                    return new Date(dateStr).toLocaleString();
                };

                // 2. 初始化核心变量
                const files = ref([]);
                const loading = ref(false);
                const TOTAL_CAPACITY_BYTES = 10 * 1024 * 1024 * 1024; 
                
                let rawUser = localStorage.getItem('nav_user') || 'USER';
                rawUser = rawUser.replace(/['"]/g, ''); 
                const username = ref(rawUser.toUpperCase()); 
                
                // 3. 计算属性 (进度条与存储量)
                const totalUsedBytes = computed(() => {
                    return files.value.reduce((sum, file) => sum + (parseInt(file.file_size) || 0), 0);
                });
                const usedSizeFormatted = computed(() => formatSize(totalUsedBytes.value));
                const storagePercentage = computed(() => {
                    if (totalUsedBytes.value === 0) return 0;
                    const pct = (totalUsedBytes.value / TOTAL_CAPACITY_BYTES) * 100;
                    return Math.min(parseFloat(pct.toFixed(2)), 100);
                });

                // 4. API 请求与交互动作
                const fetchFiles = async () => {
                    loading.value = true;
                    try {
                        const res = await fetch('/api/cloud/list', { headers: getAuthHeaders() });
                        const json = await res.json();
                        if (json.success) files.value = json.data;
                        else throw new Error(json.error);
                    } catch (error) {
                        ElMessage.error("链接终端失败: " + error.message);
                    } finally {
                        loading.value = false;
                    }
                };

                // 🚀 核心修复：完全手动掌控上传通道，规避框架 Bug
                const customUpload = async (options) => {
                    const { file, onSuccess, onError } = options;
                    const formData = new FormData();
                    formData.append('file', file);

                    try {
                        const res = await fetch('/api/cloud/upload', {
                            method: 'POST',
                            headers: getAuthHeaders(),
                            body: formData
                        });
                        const json = await res.json();
                        if (json.success) {
                            onSuccess(json); // 消除加载动画
                            ElMessage.success(`资产入库成功: ${file.name}`);
                            fetchFiles();    // 立即刷新进度条和列表
                        } else {
                            throw new Error(json.error || '后端拒绝了此请求');
                        }
                    } catch (error) {
                        console.error(error);
                        onError(error);
                        ElMessage.error(`上传被中止: ${error.message}`);
                    }
                };

                const downloadFile = (id) => {
                    window.open(`/api/cloud/download?id=${id}`, '_blank');
                };

                const deleteFile = (id) => {
                    ElMessageBox.confirm('数据将被物理抹除且无法恢复，是否执行？', '// WARNING', {
                        confirmButtonText: '确认执行',
                        cancelButtonText: '取消',
                        type: 'warning',
                        customClass: 'cyber-msgbox'
                    }).then(async () => {
                        try {
                            const res = await fetch(`/api/cloud/delete?id=${id}`, { method: 'DELETE', headers: getAuthHeaders() });
                            const json = await res.json();
                            if (json.success) {
                                ElMessage.success("抹除指令已确认");
                                fetchFiles();
                            } else throw new Error(json.error);
                        } catch (error) {
                            ElMessage.error("指令失败: " + error.message);
                        }
                    }).catch(() => {});
                };

                const goHome = () => { window.location.href = '/'; };
                const logout = () => {
                    localStorage.removeItem('nav_token');
                    localStorage.removeItem('nav_settings');
                    localStorage.removeItem('cached_links_data');
                    localStorage.removeItem('nav_user');
                    window.location.href = '/';
                };

                onMounted(() => { fetchFiles(); });

                return { 
                    files, loading, username, 
                    totalUsedBytes, usedSizeFormatted, storagePercentage, 
                    fetchFiles, customUpload, downloadFile, deleteFile, formatSize, formatDate, goHome, logout 
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
