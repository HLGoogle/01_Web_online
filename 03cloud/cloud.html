<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端容器文件中心 - 健壮生产版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-main: #0d1117; --bg-card: #161b22; --bg-input: #21262d; 
            --border-color: #30363d; --text-main: #c9d1d9; --text-muted: #8b949e; 
            --accent-color: #58a6ff; --accent-green: #2ea44f; --accent-danger: #f85149; 
            --font-apple: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: var(--font-apple); padding: 30px; -webkit-font-smoothing: antialiased; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); margin-bottom: 24px; }
        .title { font-size: 18px; font-weight: 600; color: var(--accent-color); display: flex; align-items: center; gap: 10px; }
        
        .upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; background: rgba(22, 27, 34, 0.5); padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s ease; position: relative; margin-bottom: 24px; }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent-color); background: rgba(88, 166, 255, 0.05); }
        .upload-zone input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
        .file-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; transition: all 0.2s ease; }
        .file-card:hover { transform: translateY(-2px); border-color: #388bfd80; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        
        .file-info { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .file-icon { font-size: 24px; color: var(--accent-color); flex-shrink: 0; }
        .file-name { font-size: 14px; font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; color: var(--text-main); }
        .file-size { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        
        .file-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        .action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; transition: color 0.2s; display: flex; align-items: center; gap: 4px; }
        .action-btn.dl:hover { color: var(--accent-color); }
        .action-btn.del:hover { color: var(--accent-danger); }
        
        /* 🎨 状态控制区加固：增加动态双轨进度条 */
        .status-bar { background: var(--bg-card); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 8px; display: none; margin-bottom: 16px; }
        .progress-container { width: 100%; background: var(--bg-input); height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-inner { width: 0%; height: 100%; background: linear-gradient(90deg, #2188ff, #58a6ff); transition: width 0.1s linear; }
    </style>
</head>
<body>

    <header>
        <div class="title"><i class="fas fa-shield-alt"></i> R2 Serverless 私有云盘</div>
        <div style="font-size: 13px; color: var(--text-muted);" id="user-indicator">// CONTAINER_LOADING</div>
    </header>

    <div class="status-bar" id="global-status">
        <div id="status-text" style="font-size: 13px; font-weight: 500;">⏳ 初始化总线...</div>
        <div class="progress-container">
            <div class="progress-inner" id="status-progress"></div>
        </div>
    </div>

    <div class="upload-zone" id="drop-zone">
        <input type="file" id="file-uploader" multiple>
        <i class="fas fa-cloud-upload-alt" style="font-size: 36px; color: var(--text-muted); margin-bottom: 12px;"></i>
        <p style="font-size: 14px; font-weight: 500;">点击或拖拽文件到这里直传 R2 存储桶</p>
        <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">最高单文件处理上限：100 MB （防溢出拦截）</p>
    </div>

    <div class="file-grid" id="grid-zone"></div>

    <script>
        const token = localStorage.getItem('nav_token');
        const user = localStorage.getItem('nav_user');
        const MAX_FILE_SIZE = 100 * 1024 * 1024; // 🌟 100MB 生产防溢出安全闸机制

        if (!token) {
            alert('鉴权被拦截：请先在主页完成安全登录！');
            window.close();
        } else {
            document.getElementById('user-indicator').textContent = `// OPERATOR: ${user ? user.toUpperCase() : 'UNKNOWN'}`;
            loadFileList();
        }

        // 🌟 交互加固：高亮拖拽反馈处理
        const dropZone = document.getElementById('drop-zone');
        const uploader = document.getElementById('file-uploader');
        
        ['dragenter', 'dragover'].forEach(name => dropZone.addEventListener(name, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); }, false));
        ['dragleave', 'drop'].forEach(name => dropZone.addEventListener(name, (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); }, false));
        uploader.addEventListener('change', () => handleBatchUpload(uploader.files));
        dropZone.addEventListener('drop', (e) => { handleBatchUpload(e.dataTransfer.files); });

        // 1. 安全获取云盘列表
        async function loadFileList() {
            const grid = document.getElementById('grid-zone');
            try {
                const res = await fetch('/api/cloud/list', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) throw new Error('同步故障');
                const result = await res.json();
                
                if (!result.success || result.data.length === 0) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-muted); font-size: 13px;">[ CONTAINER_EMPTY ] <br><br>存储空间空空如也，随时开始上传资产</div>`;
                    return;
                }

                grid.innerHTML = result.data.map(file => {
                    const sizeMB = (file.file_size / 1024 / 1024).toFixed(2);
                    // 🌟 漏洞修复：将文件名进行 HTML 实体转义，防止 XSS 注入攻击
                    const safeName = file.file_name.replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[m]);
                    return `
                        <div class="file-card">
                            <div class="file-info">
                                <i class="fas fa-file-alt file-icon"></i>
                                <div style="overflow: hidden; width: 100%;">
                                    <div class="file-name" title="${safeName}">${safeName}</div>
                                    <div class="file-size">${sizeMB} MB</div>
                                </div>
                            </div>
                            <div class="file-actions">
                                <button class="action-btn dl" onclick="downloadFile(${file.id})"><i class="fas fa-download"></i> 下载</button>
                                <button class="action-btn del" onclick="downloadFile(${file.id}) && false || deleteFile(${file.id})"><i class="fas fa-trash-alt"></i> 擦除</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--accent-danger);">数据网关对齐失败</div>`;
            }
        }

        // 2. 🌟 架构加固：基于 XMLHttpRequest 的异步进度多文件分步上传
        function uploadSingleFileWithProgress(file) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                const formData = new FormData();
                formData.append('file', file);

                xhr.open('POST', '/api/cloud/upload', true);
                xhr.setRequestHeader('Authorization', `Bearer ${token}`);

                // 实时捕捉上传百分比进度线
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        document.getElementById('status-progress').style.width = `${percent}%`;
                        document.getElementById('status-text').textContent = `⏳ 正在直传: ${file.name} (${percent}%)`;
                    }
                };

                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try {
                            const res = JSON.parse(xhr.responseText);
                            res.success ? resolve(res) : reject(new Error(res.error || '上传未被确认'));
                        } catch (e) { reject(new Error('网关响应非法')); }
                    } else { reject(new Error(`HTTP异常: ${xhr.status}`)); }
                };

                xhr.onerror = () => reject(new Error('网络连接异常崩溃'));
                xhr.send(formData);
            });
        }

        // 批量多任务容错器
        async function handleBatchUpload(files) {
            if (!files || files.length === 0) return;
            const statusBar = document.getElementById('global-status');
            statusBar.style.display = 'block';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                // 拦截过大文件，确保 Worker 运行时稳定，不消耗无效流量
                if (file.size > MAX_FILE_SIZE) {
                    alert(`🚨 文件安全拦截: [${file.name}] 超出了 Pages 单文件 100MB 限制！`);
                    continue;
                }

                try {
                    await uploadSingleFileWithProgress(file);
                } catch (e) {
                    console.error(e);
                    alert(`❌ 文件 [${file.name}] 上传失败: ${e.message}`);
                    // 发生异常时继续往下传，不打断队列中其余文件的上传
                }
            }

            document.getElementById('status-progress').style.width = '0%';
            statusBar.style.display = 'none';
            uploader.value = '';
            loadFileList();
        }

        // 3. 极速流式下载
        function downloadFile(id) {
            window.open(`/api/cloud/download?id=${id}&auth=${encodeURIComponent(token)}`, '_blank');
            return true;
        }

        // 4. 安全擦除记录
        async function deleteFile(id) {
            if (!confirm('⚠️ 确认将此文件从 Cloudflare R2 存储桶中物理擦除？')) return;
            try {
                const res = await fetch(`/api/cloud/delete?id=${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const r = await res.json();
                if (r.success) loadFileList();
                else alert(r.error);
            } catch (e) {
                alert('网关通信失败');
            }
        }
    </script>
</body>
</html>
