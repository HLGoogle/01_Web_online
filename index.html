<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私有云导航 | Workspace</title>
    <!-- 引入思源黑体或系统默认优质字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- 全局基础样式 (现代极简风格) --- */
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-sec: #64748b;
            --border-light: #e2e8f0;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-blur: blur(16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            /* 高级感柔和渐变背景 */
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 40% 20%, hsla(228,100%,74%,0.15) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189,100%,56%,0.15) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355,100%,93%,0.15) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 1. 登录前：圆形浮动按钮 --- */
        .visitor-update-btn {
            position: fixed; top: 30px; right: 30px;
            width: 64px; height: 64px;
            background: var(--glass-bg); backdrop-filter: var(--glass-blur);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2500; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.15);
            animation: float 4s ease-in-out infinite;
        }
        .visitor-update-btn span {
            color: var(--primary); font-size: 13px; font-weight: 600; text-align: center; line-height: 1.2;
        }
        .visitor-update-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 36px rgba(59, 130, 246, 0.25);
            background: white;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        body.logged-in .visitor-update-btn { display: none !important; }

        /* --- 2. 顶部控制台 (毛玻璃药丸风格) --- */
        .top-widget { position: fixed; top: 24px; right: 24px; z-index: 1000; display: none; }
        body.logged-in .top-widget { display: block; }
        
        .widget-trigger {
            width: 44px; height: 44px; background: var(--glass-bg);
            backdrop-filter: var(--glass-blur); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: var(--shadow-md);
            transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.6);
            font-size: 20px;
        }
        .top-widget:hover .widget-trigger { opacity: 0; pointer-events: none; transform: scale(0.9); }
        
        .widget-menu {
            position: absolute; top: 0; right: 0; width: 160px;
            background: var(--glass-bg); backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-hover);
            opacity: 0; transform: scale(0.95) translateY(-10px);
            transform-origin: top right; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex; flex-direction: column; gap: 10px;
        }
        .top-widget:hover .widget-menu { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }

        .user-info-box {
            font-size: 14px; font-weight: 600; color: var(--text-main);
            padding-bottom: 12px; border-bottom: 1px solid rgba(0,0,0,0.05);
            text-align: center; margin-bottom: 4px;
        }

        .menu-btn {
            width: 100%; padding: 10px; border: none; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-toggle { background: #eff6ff; color: #2563eb; }
        .btn-toggle:hover { background: #dbeafe; }
        .btn-settings { background: #faf5ff; color: #9333ea; }
        .btn-settings:hover { background: #f3e8ff; }
        .btn-updates { background: #f0fdf4; color: #16a34a; }
        .btn-updates:hover { background: #dcfce7; }
        .btn-logout { background: transparent; color: var(--text-sec); margin-top: 8px; border: 1px solid var(--border-light); }
        .btn-logout:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

        /* --- 3. 登录与全局弹窗 (现代模态框) --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); 
            z-index: 2000; justify-content: center; align-items: center;
            opacity: 0; animation: fadeIn 0.3s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        
        .modal-box { 
            background: var(--surface); padding: 32px; border-radius: var(--radius-lg); 
            width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); 
            transform: translateY(20px); animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            border: 1px solid rgba(255,255,255,0.8);
        }
        @keyframes slideUp { to { transform: translateY(0); } }

        .modal-title { font-size: 22px; font-weight: 600; margin-bottom: 24px; color: var(--text-main); text-align: center; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: var(--text-sec); }
        .form-input, .form-textarea { 
            width: 100%; padding: 12px 16px; border: 1px solid var(--border-light); 
            border-radius: var(--radius-sm); font-size: 14px; background: #f8fafc;
            outline: none; transition: all 0.2s; color: var(--text-main); font-family: inherit;
        }
        .form-input:focus, .form-textarea:focus { 
            background: white; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); 
        }
        .form-textarea { height: 100px; resize: vertical; }

        .btn-primary { 
            background: var(--text-main); color: white; border: none; cursor: pointer; 
            font-weight: 500; width: 100%; padding: 12px; border-radius: var(--radius-sm); 
            transition: all 0.2s; font-size: 15px; margin-top: 8px;
        }
        .btn-primary:hover { background: #334155; transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-danger { background: white; color: var(--text-main); border: 1px solid var(--border-light); padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; transition: 0.2s; font-weight: 500;}
        .btn-danger:hover { background: #f1f5f9; }

        /* 设置面板特有样式 */
        .slider-container { display: flex; align-items: center; gap: 12px; margin-top: 8px;}
        .slider-range { flex: 1; accent-color: var(--primary); cursor: pointer; }
        .slider-desc { font-size: 12px; color: var(--text-sec); margin-top: 8px; line-height: 1.5; }
        .modal-footer { margin-top: 28px; display: flex; justify-content: flex-end; gap: 12px; }

        /* --- 4. 内容区排版 (Grid网格，呼吸感极佳) --- */
        #content { max-width: 1200px; margin: 0 auto; display: none; padding-top: 20px; }
        .type-section { margin-bottom: 48px; }
        .type-title {
            font-size: 18px; font-weight: 600; color: var(--text-main); 
            margin-bottom: 20px; padding-left: 12px; position: relative;
            display: flex; align-items: center;
        }
        .type-title::before {
            content: ''; position: absolute; left: 0; width: 4px; height: 18px;
            background: var(--primary); border-radius: 4px;
        }
        .links-container {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 20px; 
        }
        
        /* 独立卡片设计 */
        .link-item {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255,255,255,0.8); border-radius: var(--radius-md);
            padding: 20px 12px; text-align: center; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center;
            box-shadow: var(--shadow-sm); position: relative;
        }
        .link-item:hover { 
            transform: translateY(-4px); 
            box-shadow: var(--shadow-hover);
            background: white; border-color: white;
        }
        
        .link-icon {
            width: 56px; height: 56px; margin: 0 auto 12px auto;
            background: #f1f5f9; border-radius: 14px; /* 类似iOS应用图标的Squircle圆角 */
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: var(--primary); font-weight: 600;
            overflow: hidden; transition: transform 0.3s ease;
        }
        .link-item:hover .link-icon { transform: scale(1.08); }
        .link-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .link-comment { 
            font-size: 13px; font-weight: 500; color: var(--text-main); 
            width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
        }

        /* --- 5. 编辑控件优化 --- */
        body.edit-mode .edit-controls { display: flex; }
        .edit-controls { 
            display: none; gap: 6px; position: absolute; top: -10px; right: -10px; z-index: 10; 
        }
        .edit-btn-mini {
            width: 24px; height: 24px; border-radius: 50%; border: none; color: white;
            font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.2s;
        }
        .edit-btn-mini:hover { transform: scale(1.15); }
        .edit-icon-btn { background: var(--text-main); }
        .del-icon-btn { background: #ef4444; }
        
        .add-item-placeholder {
            background: transparent; border: 2px dashed var(--border-light);
            border-radius: var(--radius-md); display: none; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            color: var(--text-sec); font-size: 14px; font-weight: 500;
            min-height: 120px; transition: all 0.2s;
        }
        .add-item-placeholder:hover { border-color: var(--primary); color: var(--primary); background: rgba(59,130,246,0.05); }
        body.edit-mode .add-item-placeholder { display: flex; }

        /* --- 6. 笔记悬浮弹窗 (高级感工具提示) --- */
        .note-popup {
            display: none; position: fixed; width: 300px; 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px);
            padding: 16px 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            z-index: 9999; text-align: left; font-size: 13px; color: #f8fafc; line-height: 1.6;
            white-space: pre-wrap; word-break: break-all; user-select: text; border: 1px solid rgba(255,255,255,0.1);
            animation: fadeInTool 0.2s ease-out;
        }
        @keyframes fadeInTool { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body class="edit-mode-off">

    <!-- 1. 登录前显示的圆形按钮 -->
    <div class="visitor-update-btn" onclick="window.open('/02note/note.html', '_blank')">
        <span>下一季<br>策划</span>
    </div>

    <!-- 2. 登录后显示的顶部控制台 -->
    <div class="top-widget" id="top-bar">
        <div class="widget-trigger"><span>⚙️</span></div>
        <div class="widget-menu">
            <div class="user-info-box" id="welcome-msg">Hi, User</div>
            
            <button class="menu-btn btn-toggle" onclick="toggleEditMode()" id="edit-mode-btn">🪄 开启管理</button>
            <button class="menu-btn btn-settings" onclick="openSettingsModal()">⚙️ 全局设置</button>
            
            <button class="menu-btn btn-updates" onclick="window.open('/02note/note.html', '_blank')">📝 下一季策划</button>
            
            <button class="menu-btn" style="background: #fff7e6; color: #d97706; margin-top: 5px;" onclick="window.open('https://run.wow80.eu.cc/', '_blank')">
                🎮 丛林跑酷
            </button>
            <button class="menu-btn" style="background: #e0f2fe; color: #0284c7; margin-top: 5px;" onclick="window.open('https://www.baidu.com', '_blank')">
                ⚔️ 网页传奇
            </button>
            
            <button class="menu-btn btn-logout" onclick="logout()">退出登录</button>
        </div>
    </div>

    <!-- 核心内容渲染区 -->
    <div id="content"></div>
    <div id="global-note-popup" class="note-popup"></div>

    <!-- 4. 登录/注册弹窗 -->
    <div id="auth-modal" class="modal-overlay" style="display:flex;">
        <div class="modal-box">
            <div class="modal-title" id="auth-title">Welcome Back</div>
            
            <div class="form-group">
                <input type="text" id="auth-username" class="form-input" placeholder="输入您的用户名">
            </div>
            <div class="form-group" id="group-password">
                <input type="password" id="auth-password" class="form-input" placeholder="输入密码">
            </div>
            
            <div class="form-group" id="group-reset-code" style="display:none;">
                <input type="text" id="auth-reset-code" class="form-input" placeholder="设置重置码 (非常重要!)">
            </div>
            <div class="form-group" id="group-new-pwd" style="display:none;">
                <input type="password" id="auth-new-pwd" class="form-input" placeholder="新密码">
            </div>
            
            <button class="btn-primary" id="auth-submit-btn" onclick="handleAuth()">进入导航</button>
            
            <div style="margin-top:20px; text-align:center; font-size:13px; color:var(--text-sec); font-weight:500;">
                <span onclick="switchAuthMode('login')" style="cursor:pointer; color:var(--primary); padding: 0 5px;">登录</span> &middot; 
                <span onclick="switchAuthMode('register')" style="cursor:pointer; color:var(--primary); padding: 0 5px;">注册</span> &middot; 
                <span onclick="switchAuthMode('reset')" style="cursor:pointer; color:var(--primary); padding: 0 5px;">忘记密码</span>
            </div>
            <p id="auth-msg" style="color:#ef4444; font-size:13px; text-align:center; margin-top:12px; font-weight:500;"></p>
        </div>
    </div>

    <!-- 链接编辑弹窗 -->
    <div id="link-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title" id="link-modal-title">添加链接</div>
            <input type="hidden" id="link-id">
            
            <div class="form-group">
                <label class="form-label">分类名</label>
                <input type="text" id="link-type" class="form-input" placeholder="例如: 常用工具">
            </div>
            <div class="form-group">
                <label class="form-label">网址链接</label>
                <input type="text" id="link-url" class="form-input" placeholder="https://...">
            </div>
            <div style="display: flex; gap: 12px;">
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">展示名称</label>
                    <input type="text" id="link-comment" class="form-input" placeholder="如: Google">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">图标 / 首字</label>
                    <input type="text" id="link-icon" class="form-input" placeholder="单字或图片URL">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">备忘录 (私密笔记)</label>
                <textarea id="link-note" class="form-textarea" placeholder="在此处记录账号密码或小抄..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">排序权重</label>
                <input type="number" id="link-sort" class="form-input" value="0">
            </div>
            
            <div class="modal-footer">
                <button class="btn-danger" onclick="closeLinkModal()">取消</button>
                <button class="btn-primary" style="width: auto; padding: 10px 24px; margin-top: 0;" onclick="submitLink()">保存</button>
            </div>
        </div>
    </div>

    <!-- 全局设置弹窗 -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">偏好设置</div>
            <div class="form-group" style="border-bottom: 1px solid var(--border-light); padding-bottom: 24px; margin-bottom: 24px;">
                <label class="form-label">悬浮窗灵敏度</label>
                <div class="slider-container">
                    <span style="font-size:12px;color:var(--text-sec);font-weight:500;">稳重</span>
                    <input type="range" id="setting-sensitivity" class="slider-range" min="1" max="100" value="50" oninput="updateSliderVal(this.value)">
                    <span style="font-size:12px;color:var(--text-sec);font-weight:500;">灵敏</span>
                    <span id="sensitivity-val" style="font-size:14px; font-weight:600; color:var(--text-main); margin-left:8px; min-width:24px;">50</span>
                </div>
                <div class="slider-desc">数值越大，鼠标越容易触发笔记弹窗。</div>
            </div>
            <div class="form-group">
                <label class="form-label">自定义分类排序</label>
                <input type="text" id="setting-category-order" class="form-input" placeholder="例如: 常用, 搜索, 媒体">
                <div class="slider-desc">输入中英文逗号分隔，未列出的分类将自动排在后方。</div>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" onclick="document.getElementById('settings-modal').style.display='none'">关闭</button>
                <button class="btn-primary" style="width: auto; padding: 10px 24px; margin-top: 0;" onclick="saveSettings()">应用配置</button>
            </div>
        </div>
    </div>

    <!-- 保留原有所有核心 JS 逻辑，未作任何逻辑破坏 -->
    <script>
        const mouseTrack = { x: 0, y: 0, t: 0, vx: 0, speed: 0 };
        document.addEventListener('mousemove', e => {
            const now = performance.now();
            const dt = now - mouseTrack.t;
            if (dt > 15) { 
                const dx = e.clientX - mouseTrack.x;
                const dy = e.clientY - mouseTrack.y;
                mouseTrack.vx = dx / dt; 
                mouseTrack.speed = Math.sqrt(dx*dx + dy*dy) / dt; 
                mouseTrack.x = e.clientX; mouseTrack.y = e.clientY; mouseTrack.t = now;
            }
        });

        const API_AUTH = '/api/auth';
        const API_LINKS = '/api/links';
        const API_USER = '/api/user';
        let authMode = 'login';
        let allLinks = [];
        let isEditMode = false;
        let userSettings = { sensitivity: 50, categoryOrder: "" };

        window.onload = function() {
            const token = localStorage.getItem('nav_token');
            if (token) {
                document.getElementById('auth-modal').style.display = 'none';
                const cachedSettings = localStorage.getItem('nav_settings');
                if (cachedSettings) {
                    try { userSettings = JSON.parse(cachedSettings); } catch(e){}
                }
                loadLinks();
                showUI();
            } else {
                document.getElementById('auth-modal').style.display = 'flex';
            }
        };

        function showUI() {
            const user = localStorage.getItem('nav_user');
            document.body.classList.add('logged-in'); 
            document.getElementById('top-bar').style.display = 'block';
            document.getElementById('welcome-msg').textContent = `Hi, ${user}`;
        }

        function switchAuthMode(mode) {
            authMode = mode;
            const title = document.getElementById('auth-title');
            const resetGroup = document.getElementById('group-reset-code');
            const pwdGroup = document.getElementById('group-new-pwd');
            const oldPwdGroup = document.getElementById('auth-password').parentElement;
            const btn = document.getElementById('auth-submit-btn');
            document.getElementById('auth-msg').textContent = '';
            
            if (mode === 'login') {
                title.textContent = 'Welcome Back'; btn.textContent = '进入导航';
                resetGroup.style.display = 'none'; pwdGroup.style.display = 'none'; oldPwdGroup.style.display = 'block';
            } else if (mode === 'register') {
                title.textContent = '创建新账号'; btn.textContent = '立即注册';
                resetGroup.style.display = 'block'; document.getElementById('auth-reset-code').placeholder = '设置重置码 (重要!)';
                pwdGroup.style.display = 'none'; oldPwdGroup.style.display = 'block';
            } else if (mode === 'reset') {
                title.textContent = '重置密码'; btn.textContent = '确认重置';
                oldPwdGroup.style.display = 'none'; resetGroup.style.display = 'block';
                document.getElementById('auth-reset-code').placeholder = '输入您的重置码'; pwdGroup.style.display = 'block';
            }
        }

        function openSettingsModal() {
            document.getElementById('setting-sensitivity').value = userSettings.sensitivity || 50;
            document.getElementById('sensitivity-val').textContent = userSettings.sensitivity || 50;
            document.getElementById('setting-category-order').value = userSettings.categoryOrder || "";
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function updateSliderVal(val) { document.getElementById('sensitivity-val').textContent = val; }

        async function saveSettings() {
            const newSense = parseInt(document.getElementById('setting-sensitivity').value);
            const newOrder = document.getElementById('setting-category-order').value.trim();
            userSettings.sensitivity = newSense;
            userSettings.categoryOrder = newOrder;
            localStorage.setItem('nav_settings', JSON.stringify(userSettings));
            try {
                const token = localStorage.getItem('nav_token');
                const res = await fetch(API_USER, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ settings: userSettings })
                });
                if(res.ok) {
                    document.getElementById('settings-modal').style.display = 'none';
                    loadLinks();
                } else { alert('保存失败'); }
            } catch(e) { alert('网络错误'); }
        }

        function renderLinks() {
            const content = document.getElementById('content'); content.innerHTML = '';
            let types = [...new Set(allLinks.map(l => l.type))];
            const orderStr = userSettings.categoryOrder || "";
            const priorityList = orderStr.split(/[,，]/).map(s => s.trim()).filter(s => s);
            if (priorityList.length > 0) {
                types.sort((a, b) => {
                    const indexA = priorityList.indexOf(a);
                    const indexB = priorityList.indexOf(b);
                    if (indexA !== -1 && indexB !== -1) return indexA - indexB;
                    if (indexA !== -1) return -1;
                    if (indexB !== -1) return 1;
                    return 0; 
                });
            }
            if (types.length === 0 && allLinks.length === 0) {
                 if(isEditMode) types.push('默认分类'); 
                 else {
                     content.innerHTML = '<div style="text-align:center;padding:100px;color:var(--text-sec);font-weight:500;">点击右上角 "⚙️" -> "🪄 开启管理" -> 添加数据</div>';
                     content.style.display = 'block'; return;
                 }
            }
            types.forEach(type => {
                const section = document.createElement('section'); section.className = 'type-section';
                section.innerHTML = `<div class="type-title">${type}</div>`;
                const container = document.createElement('div'); container.className = 'links-container';
                const groupLinks = allLinks.filter(l => l.type === type);
                groupLinks.forEach(link => { container.appendChild(createLinkElement(link)); });
                
                if (isEditMode) {
                    const addPlaceholder = document.createElement('div'); addPlaceholder.className = 'add-item-placeholder';
                    addPlaceholder.innerHTML = '<span style="font-size:24px;margin-bottom:4px;">+</span><span>添加链接</span>';
                    addPlaceholder.onclick = () => openLinkModal(null, type);
                    container.appendChild(addPlaceholder);
                }
                section.appendChild(container); content.appendChild(section);
            });
            content.style.display = 'block';
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('edit-mode-btn');
            if (isEditMode) { document.body.classList.add('edit-mode'); btn.textContent = '❌ 退出管理'; } 
            else { document.body.classList.remove('edit-mode'); btn.textContent = '🪄 开启管理'; }
            renderLinks();
        }

        async function handleAuth() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const resetCode = document.getElementById('auth-reset-code').value.trim();
            const newPwd = document.getElementById('auth-new-pwd').value.trim();
            const msg = document.getElementById('auth-msg');
            if (!username) return msg.textContent = '请输入用户名';
            const payload = { action: authMode, username };
            if (authMode === 'login') {
                if(!password) return msg.textContent = '请输入密码'; payload.password = password;
            } else if (authMode === 'register') {
                if(!password || !resetCode) return msg.textContent = '请填写完整信息';
                payload.password = password; payload.reset_code = resetCode;
            } else if (authMode === 'reset') {
                if(!resetCode || !newPwd) return msg.textContent = '请填写重置码和新密码';
                payload.reset_code = resetCode; payload.new_password = newPwd;
            }
            try {
                const res = await fetch(API_AUTH, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.success) {
                    if (authMode === 'login') {
                        localStorage.setItem('nav_token', data.token); 
                        localStorage.setItem('nav_user', data.username);
                        if (data.settings) {
                            localStorage.setItem('nav_settings', data.settings);
                            try { userSettings = JSON.parse(data.settings); } catch(e){}
                        }
                        document.getElementById('auth-modal').style.display = 'none'; loadLinks(); showUI();
                    } else if (authMode === 'register' || authMode === 'reset') {
                        alert('操作成功，请重新登录'); switchAuthMode('login');
                    }
                } else { msg.textContent = data.error || '操作失败'; }
            } catch (e) { msg.textContent = '网络错误'; }
        }

        function logout() { localStorage.removeItem('nav_token'); localStorage.removeItem('nav_settings'); location.reload(); }

        async function loadLinks() {
            const token = localStorage.getItem('nav_token');
            const res = await fetch(API_LINKS, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 401) { logout(); return; }
            allLinks = await res.json();
            renderLinks();
        }

        function createLinkElement(link) {
            const item = document.createElement('div'); item.className = 'link-item';
            let iconHtml = link.icon.startsWith('http') ? `<img src="${link.icon}">` : link.icon;
            item.innerHTML = `
                <div class="edit-controls">
                    <button class="edit-btn-mini edit-icon-btn" onclick="event.stopPropagation();openLinkModal(${link.id})">✎</button>
                    <button class="edit-btn-mini del-icon-btn" onclick="event.stopPropagation();deleteLink(${link.id})">×</button>
                </div>
                <div class="link-icon">${iconHtml}</div>
                <div class="link-comment" title="${link.comment || link.icon}">${link.comment || link.icon}</div>
            `;
            item.onclick = () => {
                if (isEditMode) return;
                let url = link.url; if (!url.startsWith('http')) url = 'http://' + url;
                window.open(url, '_blank');
            };
            if (link.note) {
                const popup = document.getElementById('global-note-popup');
                item.onmouseenter = (e) => {
                    if(isEditMode) return;
                    popup.textContent = link.note; popup.innerHTML = link.note.replace(/\n/g, '<br>');
                    const rect = item.getBoundingClientRect();
                    let left = rect.right + 16;
                    if (left + 300 > window.innerWidth) left = rect.left - 316;
                    popup.style.left = left + 'px'; popup.style.top = rect.top + 'px';
                    popup.style.display = 'block';
                    popup.dataset.side = (left > rect.left) ? 'right' : 'left';
                };
                item.onmouseleave = () => {
                    const side = popup.dataset.side; 
                    const isMovingTowards = (side === 'right' && mouseTrack.vx > 0.1) || (side === 'left' && mouseTrack.vx < -0.1);
                    const currentSense = userSettings.sensitivity || 50;
                    const threshold = 1.0 - (currentSense / 100) * 0.9;
                    const isFastEnough = mouseTrack.speed > threshold;
                    const delay = (isMovingTowards && isFastEnough) ? 600 : 80;
                    setTimeout(() => {
                        if (!popup.matches(':hover') && !item.matches(':hover')) {
                            popup.style.display = 'none';
                        }
                    }, delay);
                };
            }
            return item;
        }

        function openLinkModal(id = null, prefillType = '') {
            const modal = document.getElementById('link-modal');
            const title = document.getElementById('link-modal-title');
            document.getElementById('link-id').value = ''; document.getElementById('link-type').value = prefillType;
            document.getElementById('link-url').value = ''; document.getElementById('link-icon').value = '';
            document.getElementById('link-comment').value = ''; document.getElementById('link-note').value = '';
            document.getElementById('link-sort').value = '0';
            if (id) {
                const link = allLinks.find(l => l.id === id);
                if (link) {
                    title.textContent = '编辑链接';
                    document.getElementById('link-id').value = link.id; document.getElementById('link-type').value = link.type;
                    document.getElementById('link-url').value = link.url; document.getElementById('link-icon').value = link.icon;
                    document.getElementById('link-comment').value = link.comment; document.getElementById('link-note').value = link.note;
                    document.getElementById('link-sort').value = link.sort_order;
                }
            } else { title.textContent = '添加新链接'; }
            modal.style.display = 'flex';
        }

        function closeLinkModal() { document.getElementById('link-modal').style.display = 'none'; }
        
        async function submitLink() {
            const id = document.getElementById('link-id').value;
            const payload = {
                type: document.getElementById('link-type').value.trim(), url: document.getElementById('link-url').value.trim(),
                icon: document.getElementById('link-icon').value.trim(), comment: document.getElementById('link-comment').value.trim(),
                note: document.getElementById('link-note').value.trim(), sort_order: parseInt(document.getElementById('link-sort').value) || 0
            };
            if (!payload.type || !payload.url || !payload.icon) { alert('分类、链接和图标必填'); return; }
            if (id) payload.id = id;
            try {
                const token = localStorage.getItem('nav_token');
                const res = await fetch(API_LINKS, { method: id ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(payload) });
                if (res.ok) { closeLinkModal(); loadLinks(); } else { alert('保存失败'); }
            } catch (e) { alert('网络错误'); }
        }
        
        async function deleteLink(id) {
            if (!confirm('确定删除此链接？')) return;
            try {
                const token = localStorage.getItem('nav_token');
                const res = await fetch(API_LINKS, { method: 'DELETE', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ id }) });
                if (res.ok) loadLinks(); else alert('删除失败');
            } catch (e) { alert('网络错误'); }
        }
    </script>
</body>
</html>
