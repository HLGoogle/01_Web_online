<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg-main: #0d1117; --bg-card: #161b22; --bg-input: #21262d; 
            --border-color: #30363d; --text-main: #c9d1d9; --text-muted: #8b949e; 
            --accent-color: #58a6ff; --accent-green: #2ea44f; --accent-danger: #f85149; 
            --font-mono: 'Fira Code', 'Ubuntu Mono', monospace; 
            --font-apple: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --apple-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            --apple-blur: blur(20px);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: sans-serif, var(--font-mono); }
        
        body { 
            background-color: var(--bg-main); color: var(--text-main); 
            padding: 20px; min-height: 100vh; display: flex; flex-direction: column; 
            font-family: var(--font-apple);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-bottom: 80px; /* 为右下角磁贴留出余量 */
        }

        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; font-family: var(--font-mono); font-size: 13px; }
        
        .status-sync-indicator { font-size: 11px; color: var(--text-muted); background: #1f242c; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border-color); }
        .status-sync-indicator.synced { color: #58a6ff; border-color: #388bfd4d; background: #0d1117; }
        .status-sync-indicator.cached { color: #f0883e; border-color: #f0883e4d; background: #1f1510; }
        
        .top-controls { display: flex; gap: 10px; }
        .ctrl-btn { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); 
            color: var(--text-main); padding: 6px 12px; font-size: 12px; cursor: pointer; 
            border-radius: 8px; font-family: var(--font-apple); font-weight: 500;
            display: flex; align-items: center; gap: 6px; transition: all 0.2s ease;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--accent-color); color: var(--accent-color); transform: scale(1.03); }
        
        body:not(.logged-in) .top-controls { display: none; }
        
        #auth-panel { max-width: 400px; margin: 100px auto; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; width: 100%; box-shadow: var(--apple-shadow); }
        .auth-title { font-family: var(--font-mono); font-size: 16px; margin-bottom: 20px; text-align: center; color: var(--accent-color); }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
        .form-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
        .form-input { width: 100%; background: var(--bg-input); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 12px; color: var(--text-main); font-size: 14px; outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
        .form-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15); }
        .auth-switch { text-align: center; font-size: 12px; margin-top: 15px; color: var(--text-muted); }
        .auth-switch span { color: var(--accent-color); cursor: pointer; }
        
        #content { max-width: 1400px; margin: 0 auto; width: 100%; display: none; }
        body.logged-in #content { display: block; }
        
        /* 紧凑版：大分类区域之间的垂直行距 */
        .type-section { margin-bottom: 12px; border-radius: 12px; transition: background 0.3s; }
        
        /* 紧凑版：分类标题与下方书签的间距 */
        .type-header { 
            font-family: var(--font-mono); font-size: 13px; color: var(--accent-color); 
            margin-bottom: 6px; display: flex; align-items: center; gap: 8px; 
            padding: 4px 8px; margin-left: -8px; border-radius: 6px; transition: all 0.2s; 
        }
        
        body.edit-mode .type-header { cursor: grab; background: rgba(255,255,255,0.03); }
        body.edit-mode .type-header:hover { background: rgba(88, 166, 255, 0.1); }
        body.edit-mode .type-header:active { cursor: grabbing; }
        
        /* 收缩按钮 */
        .btn-collapse {
            margin-left: auto; /* 自动推到最右侧 */
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-muted);
            width: 24px; height: 24px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-collapse:hover { background: rgba(88,166,255,0.15); color: var(--accent-color); border-color: rgba(88,166,255,0.4); transform: scale(1.05); }

        .sortable-ghost { opacity: 0.3 !important; border: 1px dashed var(--accent-color) !important; background: transparent !important; box-shadow: none !important; }

        /* 紧凑版：书签卡片之间的网格间距 */
        .links-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 135px)); gap: 6px; padding-bottom: 4px; }
        
        /* 紧凑版：压扁书签卡片的高度 */
        .link-item { 
            position: relative; background: rgba(22, 27, 34, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; 
            padding: 6px 10px; cursor: pointer; display: flex; align-items: center; height: 38px; 
            backdrop-filter: blur(10px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .link-item:hover { 
            transform: translateY(-2px) scale(1.02); 
            background: rgba(30, 36, 44, 0.8); border-color: rgba(88, 166, 255, 0.3); 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); 
        }
        
        body.edit-mode .link-item { cursor: grab; }
        body.edit-mode .link-item:active { cursor: grabbing; }
        
        .link-main-info { display: flex; align-items: center; gap: 8px; width: 100%; overflow: hidden; }
        .link-icon-container { width: 24px; height: 24px; border-radius: 6px; background: var(--bg-main); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .link-icon-container img { width: 100%; height: 100%; object-fit: cover; }
        .text-icon-wrapper { font-size: 11px; font-weight: bold; color: var(--accent-color); font-family: var(--font-mono); text-align: center; }
        .link-comment { font-family: var(--font-apple); font-weight: 500; font-size: 13px; letter-spacing: 0.3px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        
        .edit-controls { display: none; position: absolute; top: 2px; right: 2px; gap: 2px; background: rgba(22, 27, 34, 0.9); padding: 2px; border-radius: 6px; z-index: 10; }
        .link-item:hover .edit-controls { display: flex; }
        body:not(.edit-mode) .edit-controls { display: none !important; }
        .mini-btn { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted); width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: all 0.2s; }
        .mini-btn:hover { color: #fff; border-color: var(--accent-color); }
        .mini-btn.del:hover { border-color: var(--accent-danger); color: var(--accent-danger); }
        .mini-btn.upload:hover { border-color: var(--accent-green); color: var(--accent-green); }
        
        .add-placeholder { border: 1px dashed rgba(255,255,255,0.1); background: transparent; display: none; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); height: 38px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .add-placeholder:hover { border-color: var(--accent-color); color: var(--accent-color); background: rgba(88, 166, 255, 0.05); }
        body.edit-mode .add-placeholder { display: flex; }
        
        .note-popup { display: none; position: fixed; width: 260px; border-radius: 12px; background: rgba(13, 17, 23, 0.85); backdrop-filter: var(--apple-blur); border: 1px solid rgba(255,255,255,0.08); padding: 12px; z-index: 9999; font-family: var(--font-mono); font-size: 11px; color: #88fa88; box-shadow: var(--apple-shadow); white-space: pre-wrap; word-break: break-all; pointer-events: none; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { border-radius: 16px; background: rgba(22, 27, 34, 0.85); backdrop-filter: var(--apple-blur); -webkit-backdrop-filter: var(--apple-blur); border: 1px solid rgba(255,255,255,0.1); box-shadow: var(--apple-shadow); padding: 24px; width: 380px; animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-footer { margin-top: 24px; display: flex; justify-content: flex-end; gap: 8px; }

        /* ==========================================
           🍎 磁贴停靠区 (Dock Container) 样式
           ========================================== */
        #dock-container {
            position: fixed; bottom: 24px; right: 24px;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 2000; align-items: flex-end;
        }
        .dock-tile {
            background: rgba(22, 27, 34, 0.75);
            backdrop-filter: var(--apple-blur); -webkit-backdrop-filter: var(--apple-blur);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; /* 胶囊状药丸设计 */
            padding: 8px 18px;
            color: var(--text-muted); font-size: 12px; font-weight: 500;
            cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; gap: 8px;
        }
        .dock-tile i { color: var(--accent-color); font-size: 11px; }
        .dock-tile:hover {
            background: rgba(30, 36, 44, 0.95); color: var(--text-main);
            border-color: rgba(88, 166, 255, 0.4);
            transform: scale(1.05) translateX(-4px); box-shadow: var(--apple-shadow);
        }
    </style>
</head>
<body>
    <header>
        <div><span class="status-sync-indicator" id="sync-status">⚡ 校验边缘终端...</span></div>
        <div class="top-controls">
            <button class="ctrl-btn" style="color: #a371f7; border-color: rgba(163, 113, 247, 0.3);" onclick="window.open('/03cloud/cloud.html', '_blank')"><i class="fas fa-folder-open"></i> 云盘</button>
            <button class="ctrl-btn" style="color: var(--accent-color); border-color: #388bfd4d;" onclick="window.open('/code-grid.html', '_blank')"><i class="fas fa-code"></i> 代码画布</button>
            <button class="ctrl-btn" onclick="toggleEditMode()" id="edit-mode-btn"><i class="fas fa-terminal"></i> 开启管理</button>
            <button class="ctrl-btn btn-logout" onclick="logout()" id="logout-btn"><i class="fas fa-power-off"></i> 注销</button>
        </div>
    </header>

    <div id="auth-panel">
        <div class="auth-title">// IDENTITY_VERIFICATION</div>
        <div class="form-group"><label class="form-label">Username / 用户名</label><input type="text" id="auth-username" class="form-input"></div>
        <div class="form-group" id="group-password"><label class="form-label">Password / 密码</label><input type="password" id="auth-password" class="form-input"></div>
        <div class="form-group" id="group-reset-code" style="display:none;"><label class="form-label">Reset Code / 安全重置码</label><input type="text" id="auth-reset-code" class="form-input"></div>
        <div class="form-group" id="group-new-pwd" style="display:none;"><label class="form-label">New Password / 新密码</label><input type="password" id="auth-new-pwd" class="form-input"></div>
        <button class="ctrl-btn" style="width:100%; padding: 10px; margin-top:10px; justify-content:center;" id="auth-submit-btn" onclick="handleAuth()">执行登录</button>
        <div class="auth-switch"><span onclick="switchAuthMode('login')">登录</span> | <span onclick="switchAuthMode('register')">注册</span> | <span onclick="switchAuthMode('reset')">找回密码</span></div>
        <p id="auth-msg" style="color:var(--accent-danger); font-size:11px; text-align:center; margin-top:10px;"></p>
    </div>

    <div id="content"><div id="links-render-zone"></div></div>
    
    <div id="dock-container"></div>
    
    <div id="global-note-popup" class="note-popup"></div>
    <input type="file" id="hidden-icon-uploader" accept="image/*" style="display: none;" onchange="handleIconFileSelected(this)">

    <div id="link-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="auth-title" id="link-modal-title">卡片核心配置</div>
            <input type="hidden" id="link-id">
            <div class="form-group"><label class="form-label">分类 (Section)</label><input type="text" id="link-type" class="form-input" placeholder="例如：常用工具"></div>
            <div class="form-group"><label class="form-label">网址 (URL)</label><input type="text" id="link-url" class="form-input"></div>
            <div class="form-group"><label class="form-label">图标显示 (Icon Key or Text)</label><input type="text" id="link-icon" class="form-input"></div>
            <div class="form-group"><label class="form-label">文字标题 (Title)</label><input type="text" id="link-comment" class="form-input"></div>
            <div class="form-group"><label class="form-label">备注说明 (Note - 选填)</label><textarea id="link-note" class="form-input" style="height:60px; resize:none;"></textarea></div>
            <div class="modal-footer"><button class="ctrl-btn" onclick="closeLinkModal()">取消</button><button class="ctrl-btn" style="color:var(--accent-color); border-color:var(--accent-color);" onclick="submitLink()">应用部署</button></div>
        </div>
    </div>

    <script>
        const API_AUTH = '/api/auth'; const API_LINKS = '/api/links'; const API_USER = '/api/user'; const CACHE_NAME = 'nav-icon-assets-v1';
        let authMode = 'login'; let allLinks = []; let isEditMode = false; let currentTargetLinkId = null;
        
        // ✨ 新增 collapsedCategories 保存分类收拢状态
        let userSettings = { categoryOrder: [], collapsedCategories: [] }; 

        function escapeHTML(str) { return str ? String(str).replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[m]) : ''; }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{})); }

        window.onload = function() {
            const token = localStorage.getItem('nav_token');
            if (token) {
                document.getElementById('auth-panel').style.display = 'none';
                const cachedSettings = localStorage.getItem('nav_settings');
                if (cachedSettings) { 
                    try { 
                        let parsed = JSON.parse(cachedSettings); 
                        if(typeof parsed.categoryOrder === 'string') parsed.categoryOrder = parsed.categoryOrder.split(/[,，]/).map(s => s.trim()).filter(s => s);
                        if(!parsed.collapsedCategories) parsed.collapsedCategories = [];
                        userSettings = parsed;
                    } catch(e){} 
                }
                showUI(); loadLinks(); 
            }
        };

        function showUI() {
            const user = localStorage.getItem('nav_user') || 'User';
            document.body.classList.add('logged-in');
            document.getElementById('logout-btn').innerHTML = `<i class="fas fa-power-off"></i> [ ${escapeHTML(user.toUpperCase())} ] 注销`;
        }

        function switchAuthMode(mode) {
            authMode = mode; const title = document.getElementById('auth-title'); const resetGroup = document.getElementById('group-reset-code'); const pwdGroup = document.getElementById('group-new-pwd'); const oldPwdGroup = document.getElementById('auth-password').parentElement;
            document.getElementById('auth-msg').textContent = '';
            if (mode === 'login') { title.textContent = '// IDENTITY_VERIFICATION'; resetGroup.style.display = 'none'; pwdGroup.style.display = 'none'; oldPwdGroup.style.display = 'block'; }
            else if (mode === 'register') { title.textContent = '// REGISTER_NEW_ACCOUNT'; resetGroup.style.display = 'block'; pwdGroup.style.display = 'none'; oldPwdGroup.style.display = 'block'; }
            else if (mode === 'reset') { title.textContent = '// RESET_CREDENTIALS'; oldPwdGroup.style.display = 'none'; resetGroup.style.display = 'block'; pwdGroup.style.display = 'block'; }
        }

        async function loadLinks() {
            const token = localStorage.getItem('nav_token'); const indicator = document.getElementById('sync-status'); const cachedLinks = localStorage.getItem('cached_links_data');
            if (cachedLinks) { try { allLinks = JSON.parse(cachedLinks); renderLinks(); indicator.className = "status-sync-indicator cached"; indicator.textContent = "⚠️ 离线浏览 // 维持本地强缓存运行"; } catch(e){} }
            try {
                const res = await fetch(API_LINKS, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.status === 401) return logout();
                const freshLinks = await res.json();
                if (JSON.stringify(freshLinks) !== cachedLinks) { allLinks = freshLinks; localStorage.setItem('cached_links_data', JSON.stringify(freshLinks)); renderLinks(); }
                indicator.className = "status-sync-indicator synced"; indicator.textContent = "⚙️ 系统就绪 // 已实时对齐 D1 数据库";
            } catch (err) { console.log("静默维持缓存运行。"); }
        }

        // ==========================================
        // ☁️ 通用配置上云同步函数
        // ==========================================
        async function syncUserSettings(silent = false) {
            localStorage.setItem('nav_settings', JSON.stringify(userSettings));
            if (!silent) renderLinks(); 
            
            const indicator = document.getElementById('sync-status');
            indicator.textContent = "⏳ 同步配置中...";
            indicator.className = "status-sync-indicator cached";
            
            try {
                const token = localStorage.getItem('nav_token');
                const res = await fetch(API_USER, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ settings: userSettings })
                });
                if (res.ok) {
                    indicator.textContent = "✅ 云端已同步";
                    indicator.className = "status-sync-indicator synced";
                }
            } catch(e) {
                indicator.textContent = "⚠️ 网络异常，本地缓存中";
            }
        }

        // ==========================================
        // 🔄 收缩 & 展开 逻辑
        // ==========================================
        window.collapseCategory = function(type) {
            if (!userSettings.collapsedCategories.includes(type)) {
                userSettings.collapsedCategories.push(type);
                syncUserSettings(false); // 触发UI重绘和云端保存
            }
        };

        window.restoreCategory = function(type) {
            userSettings.collapsedCategories = userSettings.collapsedCategories.filter(t => t !== type);
            syncUserSettings(false);
        };

        function renderLinks() {
            const contentZone = document.getElementById('links-render-zone');
            const dockContainer = document.getElementById('dock-container');
            const mainFrag = document.createDocumentFragment();
            
            dockContainer.innerHTML = ''; // 清空磁贴区准备重绘

            let types = [...new Set(allLinks.map(l => l.type))];
            
            const priorityList = Array.isArray(userSettings.categoryOrder) ? userSettings.categoryOrder : [];
            if (priorityList.length > 0) {
                types.sort((a, b) => { 
                    const idxA = priorityList.indexOf(a); 
                    const idxB = priorityList.indexOf(b); 
                    if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                    if (idxA !== -1) return -1;
                    if (idxB !== -1) return 1;
                    return 0;
                }); 
            }
            
            if (types.length === 0 && allLinks.length === 0) {
                if (isEditMode) types.push('常用工具');
                else { contentZone.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-muted);font-family:var(--font-mono)">[ END_POINT_EMPTY ] <br><br>云端环境已就绪，请点击右上角开启管理进行数据录入</div>'; return; }
            }

            types.forEach(type => {
                // 如果该分类在收拢列表中，直接渲染成磁贴并跳过主区域渲染
                const isCollapsed = userSettings.collapsedCategories.includes(type);
                if (isCollapsed) {
                    const tile = document.createElement('div');
                    tile.className = 'dock-tile';
                    tile.title = '点击还原此分类';
                    tile.innerHTML = `<i class="fas fa-expand-alt"></i> ${escapeHTML(type)}`;
                    tile.onclick = () => restoreCategory(type);
                    dockContainer.appendChild(tile);
                    return; 
                }

                const section = document.createElement('section'); 
                section.className = 'type-section';
                section.dataset.type = type; 
                
                const handleIcon = isEditMode ? '<i class="fas fa-grip-lines" style="color:var(--text-muted); font-size:10px;"></i> ' : '';
                
                // 构建带有收缩按钮的标题栏
                const header = document.createElement('div');
                header.className = 'type-header';
                header.innerHTML = `${handleIcon}<span>${escapeHTML(type)}</span>`;
                
                const collapseBtn = document.createElement('div');
                collapseBtn.className = 'btn-collapse';
                collapseBtn.title = '收拢并隐藏该分类';
                collapseBtn.innerHTML = '<i class="fas fa-compress-alt"></i>';
                collapseBtn.onclick = () => collapseCategory(type);
                
                header.appendChild(collapseBtn);
                section.appendChild(header);
                
                const container = document.createElement('div'); container.className = 'links-container';
                const groupLinks = allLinks.filter(l => l.type === type).sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
                
                groupLinks.forEach(link => container.appendChild(createLinkCard(link)));
                
                const addPlaceholder = document.createElement('div'); addPlaceholder.className = 'add-placeholder';
                addPlaceholder.innerHTML = '[ + NEW_LINK ]'; addPlaceholder.onclick = () => openLinkModal(null, type);
                container.appendChild(addPlaceholder);
                
                section.appendChild(container); mainFrag.appendChild(section);
            });
            
            contentZone.innerHTML = ''; contentZone.appendChild(mainFrag);

            if (isEditMode) {
                // 大分类区域排序
                Sortable.create(contentZone, {
                    animation: 200,
                    handle: '.type-header', 
                    ghostClass: 'sortable-ghost',
                    onEnd: function (evt) {
                        if (evt.oldIndex === evt.newIndex) return; 
                        const sections = contentZone.querySelectorAll('.type-section');
                        const visibleOrder = Array.from(sections).map(sec => sec.dataset.type);
                        const collapsed = userSettings.collapsedCategories || [];
                        // 确保收拢状态的分类不被丢失，合并可见和不可见分类
                        userSettings.categoryOrder = [...new Set([...visibleOrder, ...collapsed])];
                        syncUserSettings(true);
                    }
                });

                // 卡片排序
                document.querySelectorAll('.links-container').forEach(container => {
                    Sortable.create(container, {
                        animation: 150,               
                        ghostClass: 'sortable-ghost', 
                        draggable: '.link-item',      
                        onEnd: async function (evt) {
                            if (evt.oldIndex === evt.newIndex) return; 
                            const items = container.querySelectorAll('.link-item');
                            const token = localStorage.getItem('nav_token');
                            const updatedData = Array.from(items).map((el, index) => {
                                const elId = parseInt(el.dataset.id);
                                const linkObj = allLinks.find(l => l.id === elId);
                                if (linkObj) linkObj.sort_order = index; 
                                return { id: elId, sort_order: index };
                            });

                            document.getElementById('sync-status').textContent = "⏳ 正在同步节点权重...";
                            document.getElementById('sync-status').className = "status-sync-indicator cached";

                            try {
                                const res = await fetch(API_LINKS, {
                                    method: 'PUT',
                                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                    body: JSON.stringify(updatedData) 
                                });
                                if (res.ok) {
                                    document.getElementById('sync-status').textContent = "✅ 节点权重已保存";
                                    document.getElementById('sync-status').className = "status-sync-indicator synced";
                                    localStorage.setItem('cached_links_data', JSON.stringify(allLinks));
                                } else {
                                    alert("排序保存失败，请刷新重试！");
                                }
                            } catch(e) {
                                alert("网络异常，无法保存排序。");
                            }
                        }
                    });
                });
            }
        }

        function createLinkCard(link) {
            const item = document.createElement('div'); item.className = 'link-item';
            item.dataset.id = link.id; 
            const imgId = `img-node-${link.id}`; let iconHtml = '';
            
            if (link.icon && link.icon.startsWith('user_')) {
                iconHtml = `<img id="${imgId}" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><rect width='24' height='24' fill='%2321262d'/></svg>">`;
                fetchAndCacheIcon(`/api/icon/${link.icon}`, imgId);
            } else {
                const textIcon = link.icon ? link.icon.slice(0, 2) : (link.comment || '无').slice(0, 2);
                iconHtml = `<span class="text-icon-wrapper">${escapeHTML(textIcon)}</span>`;
            }

            item.innerHTML = `
                <div class="edit-controls">
                    <button class="mini-btn upload" title="上传专属KV图片" onclick="event.stopPropagation();triggerIconUpload(${link.id})"><i class="fas fa-cloud-upload-alt"></i></button>
                    <button class="mini-btn" onclick="event.stopPropagation();openLinkModal(${link.id})"><i class="fas fa-pen"></i></button>
                    <button class="mini-btn del" onclick="event.stopPropagation();deleteLink(${link.id})"><i class="fas fa-times"></i></button>
                </div>
                <div class="link-main-info">
                    <div class="link-icon-container">${iconHtml}</div>
                    <div class="link-comment">${escapeHTML(link.comment) || '无标题'}</div>
                </div>
            `;

            item.onclick = () => { if (isEditMode) return; window.open(link.url.startsWith('http') ? link.url : 'http://' + link.url, '_blank'); };
            
            if (link.note) {
                const popup = document.getElementById('global-note-popup');
                item.onmouseenter = () => {
                    if (isEditMode) return;
                    popup.innerHTML = `NOTE:\n${escapeHTML(link.note).replace(/\n/g, '<br>')}`;
                    const rect = item.getBoundingClientRect(); let left = rect.right + 8;
                    if (left + 260 > window.innerWidth) left = rect.left - 270;
                    popup.style.left = left + 'px'; popup.style.top = rect.top + 'px'; popup.style.display = 'block';
                };
                item.onmouseleave = () => { popup.style.display = 'none'; };
            }
            return item;
        }

        async function fetchAndCacheIcon(url, targetImgId) {
            if (!('caches' in window)) { const imgNode = document.getElementById(targetImgId); if (imgNode) imgNode.src = url; return; }
            const cache = await caches.open(CACHE_NAME); const cachedResponse = await cache.match(url);
            const mountAndReleaseBlob = async (responseObj) => { const blob = await responseObj.blob(); const blobUrl = URL.createObjectURL(blob); const imgNode = document.getElementById(targetImgId); if (imgNode) { imgNode.src = blobUrl; imgNode.onload = () => URL.revokeObjectURL(blobUrl); } };

            if (cachedResponse) {
                await mountAndReleaseBlob(cachedResponse);
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                fetch(url + '?_ts=' + Date.now(), { signal: controller.signal }).then(netRes => { if (netRes.status === 200) cache.put(url, netRes); })
                .catch(()=>{})
                .finally(() => clearTimeout(timeoutId));
            } else {
                try { const response = await fetch(url); if (response.status === 200) { await cache.put(url, response.clone()); await mountAndReleaseBlob(response); } } 
                catch(e) { const imgNode = document.getElementById(targetImgId); if (imgNode) imgNode.src = url; }
            }
        }

        function triggerIconUpload(linkId) { currentTargetLinkId = linkId; document.getElementById('hidden-icon-uploader').click(); }
        async function handleIconFileSelected(inputElement) {
            const file = inputElement.files[0]; if (!file || !currentTargetLinkId) return;
            if (file.size > 2 * 1024 * 1024) { alert("不可超过 2MB"); inputElement.value = ''; return; }
            const token = localStorage.getItem('nav_token'); document.getElementById('sync-status').textContent = "⏳ 正在直传图片资产...";
            try {
                const res = await fetch(`/api/user/upload-icon?name=${encodeURIComponent(file.name)}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: file });
                const uploadResult = await res.json();
                if (uploadResult.success) {
                    const targetLink = allLinks.find(l => l.id === currentTargetLinkId);
                    if (targetLink) {
                        targetLink.icon = uploadResult.kvKey;
                        await fetch(API_LINKS, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(targetLink) });
                        if ('caches' in window) { const cache = await caches.open(CACHE_NAME); await cache.delete(`/api/icon/${uploadResult.kvKey}`); }
                        loadLinks();
                    }
                } else alert('直传终止: ' + uploadResult.error);
            } catch (e) { alert('存储资产失败: ' + e.message); } finally { inputElement.value = ''; currentTargetLinkId = null; }
        }

        function toggleEditMode() { 
            isEditMode = !isEditMode; 
            document.getElementById('edit-mode-btn').innerHTML = isEditMode ? `<i class="fas fa-desktop"></i> 退出管理` : `<i class="fas fa-terminal"></i> 开启管理`; 
            document.body.classList.toggle('edit-mode', isEditMode); 
            renderLinks(); 
        }
        
        function openLinkModal(id = null, prefillType = '') {
            document.getElementById('link-id').value = ''; 
            document.getElementById('link-type').value = prefillType; 
            document.getElementById('link-url').value = ''; 
            document.getElementById('link-icon').value = ''; 
            document.getElementById('link-comment').value = ''; 
            document.getElementById('link-note').value = ''; 
            
            if (id) { 
                const link = allLinks.find(l => l.id === id); 
                if (link) { 
                    document.getElementById('link-id').value = link.id; 
                    document.getElementById('link-type').value = link.type; 
                    document.getElementById('link-url').value = link.url; 
                    document.getElementById('link-icon').value = link.icon; 
                    document.getElementById('link-comment').value = link.comment; 
                    document.getElementById('link-note').value = link.note; 
                } 
            }
            document.getElementById('link-modal').style.display = 'flex';
        }
        
        function closeLinkModal() { document.getElementById('link-modal').style.display = 'none'; }
        
        async function submitLink() {
            const id = document.getElementById('link-id').value; 
            const token = localStorage.getItem('nav_token');
            const typeVal = document.getElementById('link-type').value.trim();
            
            let finalSortOrder = 0;
            if (id) {
                const existingLink = allLinks.find(l => l.id == id);
                finalSortOrder = existingLink ? existingLink.sort_order : 0;
            } else {
                finalSortOrder = allLinks.filter(l => l.type === typeVal).length;
            }

            const payload = { 
                type: typeVal, 
                url: document.getElementById('link-url').value.trim(), 
                icon: document.getElementById('link-icon').value.trim(), 
                comment: document.getElementById('link-comment').value.trim(), 
                note: document.getElementById('link-note').value.trim(), 
                sort_order: finalSortOrder 
            };
            
            if (!payload.type || !payload.url) return alert('必填参数缺失'); 
            if (id) payload.id = id;
            
            const res = await fetch(API_LINKS, { 
                method: id ? 'PUT' : 'POST', 
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
                body: JSON.stringify(payload) 
            });
            
            if (res.ok) { 
                closeLinkModal(); 
                loadLinks(); 
            }
        }
        
        async function deleteLink(id) { if (!confirm('⚠️ 危险操作：确认要物理擦除此卡片记录？')) return; const res = await fetch(API_LINKS, { method: 'DELETE', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('nav_token')}` }, body: JSON.stringify({ id }) }); if (res.ok) loadLinks(); }
        
        async function handleAuth() {
            const username = document.getElementById('auth-username').value.trim(); const password = document.getElementById('auth-password').value.trim(); const resetCode = document.getElementById('auth-reset-code').value.trim(); const newPwd = document.getElementById('auth-new-pwd').value.trim(); const msg = document.getElementById('auth-msg');
            const payload = { action: authMode, username };
            if (authMode === 'login') payload.password = password; else if (authMode === 'register') { payload.password = password; payload.reset_code = resetCode; } else if (authMode === 'reset') { payload.reset_code = resetCode; payload.new_password = newPwd; }
            try {
                const res = await fetch(API_AUTH, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.success) {
                    if (authMode === 'login') {
                        localStorage.setItem('nav_token', data.token); localStorage.setItem('nav_user', data.username);
                        if (data.settings) { 
                            localStorage.setItem('nav_settings', data.settings); 
                            try { 
                                let parsed = JSON.parse(data.settings); 
                                if(typeof parsed.categoryOrder === 'string') parsed.categoryOrder = parsed.categoryOrder.split(/[,，]/).map(s => s.trim()).filter(s => s);
                                if(!parsed.collapsedCategories) parsed.collapsedCategories = [];
                                userSettings = parsed;
                            } catch(e){} 
                        }
                        document.getElementById('auth-panel').style.display = 'none'; showUI(); loadLinks();
                    } else { alert('指令验证执行通过'); switchAuthMode('login'); }
                } else msg.textContent = `>> ERROR: ${data.error || 'BAD_REQUEST'}`;
            } catch(e) { msg.textContent = '>> ERROR: CONN_TIMEOUT'; }
        }
        function logout() { localStorage.removeItem('nav_token'); localStorage.removeItem('nav_settings'); localStorage.removeItem('cached_links_data'); localStorage.removeItem('nav_user'); location.reload(); }
    </script>
</body>
