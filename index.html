<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console // 私有云导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 编程大佬硬核设计风格：极简、高密度、深色调 --- */
        :root {
            --bg-main: #0d1117;       /* 类似 GitHub 的深色背景 */
            --bg-card: #161b22;       /* 卡片/容器背景 */
            --bg-input: #21262d;      /* 输入框背景 */
            --border-color: #30363d;  /* 细边框颜色 */
            --text-main: #c9d1d9;     /* 主文字颜色 */
            --text-muted: #8b949e;    /* 次要文字颜色 */
            --accent-color: #58a6ff;  /* 终端蓝（高亮） */
            --accent-green: #2ea44f;  /* 置顶/成功绿 */
            --accent-danger: #f85149; /* 删除红 */
            --font-mono: 'Fira Code', 'Ubuntu Mono', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, var(--font-mono);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- 顶部紧凑状态栏 --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            font-family: var(--font-mono);
            font-size: 13px;
        }
        .sys-status {
            display: flex;
            align-items: center;
        }
        .status-sync-indicator {
            font-size: 11px;
            color: var(--text-muted);
            background: #1f242c;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        .status-sync-indicator.synced {
            color: #58a6ff;
            border-color: #388bfd4d;
            background: #0d1117;
        }
        .status-sync-indicator.cached {
            color: #f0883e;
            border-color: #f0883e4d;
            background: #1f1510;
        }
        .top-controls {
            display: flex;
            gap: 10px;
        }
        .ctrl-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: var(--font-mono);
            transition: all 0.2s;
        }
        .ctrl-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .ctrl-btn.btn-logout:hover {
            border-color: var(--accent-danger);
            color: var(--accent-danger);
        }
        body:not(.logged-in) .top-controls { display: none; }

        /* --- 模块：受访客控制台（未登录状态） --- */
        #auth-panel {
            max-width: 400px;
            margin: 100px auto;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 30px;
            width: 100%;
        }
        .auth-title {
            font-family: var(--font-mono);
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
            color: var(--accent-color);
        }
        .form-group { 
            margin-bottom: 12px; 
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent-color); }
        .form-input::placeholder {
            color: #3b424d;
            font-size: 12px;
        }
        .auth-switch {
            text-align: center;
            font-size: 12px;
            margin-top: 15px;
            color: var(--text-muted);
        }
        .auth-switch span { color: var(--accent-color); cursor: pointer; }

        /* --- 主体内容区（紧凑栅格布局） --- */
        #content {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: none;
            flex: 1;
        }
        body.logged-in #content { display: block; }

        .type-section {
            margin-bottom: 25px;
        }
        .type-header {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--accent-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .type-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .links-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 130px)); 
            gap: 10px;
        }

        /* --- 极致紧凑型导航卡片（已移除底端网址留白空间） --- */
        .link-item {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            height: 46px; /* 从65px缩减到46px，高度高度精简 */
            transition: border-color 0.2s, transform 0.1s;
        }
        .link-item:hover {
            border-color: var(--accent-color);
            transform: translateY(-1px);
        }
        .link-main-info {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            overflow: hidden;
        }
        .link-icon-container {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: var(--accent-color);
            overflow: hidden;
            flex-shrink: 0;
        }
        .link-icon-container img { width: 100%; height: 100%; object-fit: cover; }
        .link-comment {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        /* 卡片管理控制 */
        .edit-controls {
            display: none;
            position: absolute;
            top: 2px;
            right: 2px;
            gap: 2px;
            background: rgba(22, 27, 34, 0.85);
            padding: 2px;
            border-radius: 3px;
        }
        .link-item:hover .edit-controls { 
            display: flex; 
        }
        body:not(.edit-mode) .edit-controls { display: none !important; }
        .mini-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 16px; height: 16px;
            font-size: 9px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border-radius: 2px;
        }
        .mini-btn:hover { color: #fff; border-color: var(--accent-color); }
        .mini-btn.del:hover { border-color: var(--accent-danger); color: var(--accent-danger); }

        .add-placeholder {
            border: 1px dashed var(--border-color);
            background: transparent;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            height: 46px; /* 同步降低高度 */
            border-radius: 4px;
            cursor: pointer;
        }
        .add-placeholder:hover { border-color: var(--accent-color); color: var(--accent-color); }
        body.edit-mode .add-placeholder { display: flex; }

        /* 全局账号密码悬浮提示节点 */
        .note-popup {
            display: none;
            position: fixed;
            width: 260px;
            background: #161b22e6;
            backdrop-filter: blur(8px);
            border: 1px solid var(--accent-color);
            padding: 12px;
            border-radius: 6px;
            z-index: 9999;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #88fa88; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            white-space: pre-wrap;
            word-break: break-all;
            pointer-events: none;
        }

        /* 侧边滑动一体化笔记本控制台 */
        #notes-sidebar {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100vh;
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            box-shadow: -5px 0 25px rgba(0,0,0,0.3);
            z-index: 2000;
            transition: right 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        #notes-sidebar.active { right: 0; }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--accent-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .note-input-area {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            width: 100%;
            height: 80px;
            padding: 10px;
            color: var(--text-main);
            font-size: 13px;
            resize: none;
            outline: none;
            margin-bottom: 8px;
        }
        .note-list-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sidebar-note-item {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            position: relative;
            font-size: 12px;
        }
        .sidebar-note-item.pinned { border-left: 3px solid var(--accent-color); }
        .note-item-text { white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
        .note-item-meta {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
            font-size: 10px;
            font-family: var(--font-mono);
        }
        .note-meta-action { color: var(--text-muted); cursor: pointer; }
        .note-meta-action:hover { color: var(--accent-color); }
        .note-meta-action.del:hover { color: var(--accent-danger); }

        /* 弹窗通用基础样式 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(2px); z-index: 3000;
            justify-content: center; align-items: center;
        }
        .modal-box {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 20px; width: 360px;
        }
        .modal-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 8px; }
    </style>
</head>
<body>

    <header>
        <div class="sys-status">
            <span class="status-sync-indicator cached" id="sync-status">⚠️ 离线浏览 // 当前正使用本地缓存加载</span>
        </div>
        <div class="top-controls">
            <button class="ctrl-btn" onclick="openSettingsModal()"><i class="fas fa-sliders-h"></i> 全局设置</button>
            <button class="ctrl-btn" onclick="toggleEditMode()" id="edit-mode-btn"><i class="fas fa-terminal"></i> 开启管理</button>
            <button class="ctrl-btn" onclick="toggleNotesSidebar()"><i class="fas fa-code-branch"></i> 策划笔记本</button>
            <button class="ctrl-btn btn-logout" onclick="logout()" id="logout-btn"><i class="fas fa-power-off"></i> 注销</button>
        </div>
    </header>

    <div id="auth-panel">
        <div class="auth-title">// IDENTITY_VERIFICATION</div>
        <div class="form-group">
            <label class="form-label">Username / 用户名</label>
            <input type="text" id="auth-username" class="form-input" placeholder="USERNAME">
        </div>
        <div class="form-group" id="group-password">
            <label class="form-label">Password / 密码</label>
            <input type="password" id="auth-password" class="form-input" placeholder="PASSWORD">
        </div>
        <div class="form-group" id="group-reset-code" style="display:none;">
            <label class="form-label">Reset Code / 安全重置码</label>
            <input type="text" id="auth-reset-code" class="form-input" placeholder="RESET_CODE">
        </div>
        <div class="form-group" id="group-new-pwd" style="display:none;">
            <label class="form-label">New Password / 新密码</label>
            <input type="password" id="auth-new-pwd" class="form-input" placeholder="NEW_PASSWORD">
        </div>
        <button class="ctrl-btn" style="width:100%; padding: 8px; margin-top:10px;" id="auth-submit-btn" onclick="handleAuth()">执行登录</button>
        <div class="auth-switch">
            <span onclick="switchAuthMode('login')">登录</span> | 
            <span onclick="switchAuthMode('register')">注册</span> | 
            <span onclick="switchAuthMode('reset')">找回密码</span>
        </div>
        <p id="auth-msg" style="color:var(--accent-danger); font-size:11px; font-family:var(--font-mono); text-align:center; margin-top:10px;"></p>
    </div>

    <div id="content"></div>
    
    <div id="global-note-popup" class="note-popup"></div>

    <div id="notes-sidebar">
        <div class="sidebar-header">
            <span><i class="fas fa-keyboard"></i> DEV_NOTES // 下一季策划</span>
            <span style="cursor:pointer;" onclick="toggleNotesSidebar()">❌</span>
        </div>
        <textarea class="note-input-area" id="note-textarea" placeholder="在此输入你的架构思路或备忘代码..."></textarea>
        <button class="ctrl-btn" style="width:100%; padding: 6px 0;" onclick="submitNote()">保存至边缘云数据库</button>
        <div class="note-list-container" id="notes-list"></div>
    </div>

    <div id="link-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="auth-title" id="link-modal-title">// LINK_CONFIG</div>
            <input type="hidden" id="link-id">
            
            <div class="form-group">
                <label class="form-label">// CATEGORY / 分类名称</label>
                <input type="text" id="link-type" class="form-input" placeholder="例如: 常用, LUA, 宣传">
            </div>
            <div class="form-group">
                <label class="form-label">// TARGET_URL / 目标网址</label>
                <input type="text" id="link-url" class="form-input" placeholder="https://...">
            </div>
            <div class="form-group">
                <label class="form-label">// ICON_SOURCE / 图标配置</label>
                <input type="text" id="link-icon" class="form-input" placeholder="输入2个字(如: 百度) 或 图片链接">
            </div>
            <div class="form-group">
                <label class="form-label">// DISPLAY_NAME / 卡片标题</label>
                <input type="text" id="link-comment" class="form-input" placeholder="卡片上显示的名称">
            </div>
            <div class="form-group">
                <label class="form-label">// SECRETS_NOTE / 私密代码笔记 (可存账密)</label>
                <textarea id="link-note" class="form-input" style="height:60px; resize:none;" placeholder="此处内容仅在悬浮窗中作为代码注释展示..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">// SORT_WEIGHT / 排序权重</label>
                <input type="number" id="link-sort" class="form-input" value="0" placeholder="数值越小越靠前">
            </div>
            
            <div class="modal-footer">
                <button class="ctrl-btn" onclick="closeLinkModal()">取消</button>
                <button class="ctrl-btn" style="color:var(--accent-color); border-color:var(--accent-color);" onclick="submitLink()">应用配置</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="auth-title">// GLOBAL_SETTINGS</div>
            
            <div class="form-group" style="border-bottom: 1px dashed var(--border-color); padding-bottom: 12px;">
                <label class="form-label">// SENSITIVITY / 悬浮灵敏度 (1-100)</label>
                <input type="range" id="setting-sensitivity" min="1" max="100" value="50" style="width: 100%; cursor: pointer;">
                <div style="font-size: 10px; color: var(--text-muted); margin-top: 2px;">数值越大，划过卡片时账号密码弹窗展开响应越灵敏。</div>
            </div>

            <div class="form-group">
                <label class="form-label">// CATEGORY_ORDER / 分类展示优先级顺序</label>
                <input type="text" id="setting-category-order" class="form-input" placeholder="例如: 常用, LUA, 宣传">
                <div style="font-size: 10px; color: var(--text-muted); margin-top: 4px;">用中英文逗号隔开。未列出的剩余分类将自动靠后追加。</div>
            </div>

            <div class="modal-footer">
                <button class="ctrl-btn" onclick="document.getElementById('settings-modal').style.display='none'">取消</button>
                <button class="ctrl-btn" style="color:var(--accent-color); border-color:var(--accent-color);" onclick="saveSettings()">确认保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_AUTH = '/api/auth';
        const API_LINKS = '/api/links';
        const API_NOTES = '/api/notes';
        const API_USER = '/api/user';
        
        let authMode = 'login';
        let allLinks = [];
        let isEditMode = false;
        let userSettings = { sensitivity: 50, categoryOrder: "" };

        const mouseTrack = { x: 0, y: 0, t: 0, vx: 0 };
        document.addEventListener('mousemove', e => {
            const now = performance.now();
            const dt = now - mouseTrack.t;
            if (dt > 15) {
                mouseTrack.vx = (e.clientX - mouseTrack.x) / dt;
                mouseTrack.x = e.clientX; mouseTrack.y = e.clientY; mouseTrack.t = now;
            }
        });

        window.onload = function() {
            const token = localStorage.getItem('nav_token');
            if (token) {
                document.getElementById('auth-panel').style.display = 'none';
                const cachedSettings = localStorage.getItem('nav_settings');
                if (cachedSettings) {
                    try { userSettings = JSON.parse(cachedSettings); } catch(e){}
                }
                showUI();
                loadLinks(); 
            }
        };

        function showUI() {
            const user = localStorage.getItem('nav_user');
            document.body.classList.add('logged-in');
            document.getElementById('logout-btn').innerHTML = `<i class="fas fa-power-off"></i> [ ${user.toUpperCase()} ] 注销`;
        }

        function switchAuthMode(mode) {
            authMode = mode;
            const title = document.getElementById('auth-title');
            const resetGroup = document.getElementById('group-reset-code');
            const pwdGroup = document.getElementById('group-new-pwd');
            const oldPwdGroup = document.getElementById('auth-password').parentElement;
            document.getElementById('auth-msg').textContent = '';
            
            if (mode === 'login') {
                title.textContent = '// IDENTITY_VERIFICATION';
                resetGroup.style.display = 'none'; pwdGroup.style.display = 'none'; oldPwdGroup.style.display = 'block';
            } else if (mode === 'register') {
                title.textContent = '// REGISTER_NEW_ACCOUNT';
                resetGroup.style.display = 'block'; pwdGroup.style.display = 'none'; oldPwdGroup.style.display = 'block';
            } else if (mode === 'reset') {
                title.textContent = '// RESET_CREDENTIALS';
                oldPwdGroup.style.display = 'none'; resetGroup.style.display = 'block'; pwdGroup.style.display = 'block';
            }
        }

        async function loadLinks() {
            const token = localStorage.getItem('nav_token');
            const indicator = document.getElementById('sync-status');

            const cachedLinks = localStorage.getItem('cached_links_data');
            if (cachedLinks) {
                try {
                    allLinks = JSON.parse(cachedLinks);
                    renderLinks();
                    indicator.className = "status-sync-indicator cached";
                    indicator.textContent = "⚠️ 离线浏览 // 当前正使用本地缓存加载";
                } catch(e) { console.error("缓存校验失败", e); }
            }

            try {
                const res = await fetch(API_LINKS, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.status === 401) { logout(); return; }
                const freshLinks = await res.json();

                if (JSON.stringify(freshLinks) !== cachedLinks) {
                    allLinks = freshLinks;
                    localStorage.setItem('cached_links_data', JSON.stringify(freshLinks));
                    renderLinks();
                }
                indicator.className = "status-sync-indicator synced";
                indicator.textContent = "⚙️ 系统就绪 // 已实时同步远程云端数据库 (Cloudflare D1)";
            } catch (err) {
                indicator.className = "status-sync-indicator cached";
                indicator.textContent = "⚠️ 离线浏览 // 当前正使用本地缓存加载";
            }
        }

        function renderLinks() {
            const content = document.getElementById('content'); 
            content.innerHTML = '';
            let types = [...new Set(allLinks.map(l => l.type))];

            const orderStr = userSettings.categoryOrder || "";
            const priorityList = orderStr.split(/[,，]/).map(s => s.trim()).filter(s => s);
            if (priorityList.length > 0) {
                types.sort((a, b) => {
                    const indexA = priorityList.indexOf(a);
                    const indexB = priorityList.indexOf(b);
                    if (indexA !== -1 && indexB !== -1) return indexA - indexB;
                    if (indexA !== -1) return -1;
                    if (indexB !== -1) return 1;
                    return 0; 
                });
            }

            if (types.length === 0 && allLinks.length === 0) {
                if (isEditMode) types.push('常用');
                else {
                    content.innerHTML = '<div style="text-align:center;padding:50px;color:var(--text-muted);font-family:var(--font-mono); font-size:13px;">[ SYSTEM EMPTY ] <br>请开启管理终端命令链来录入首条数据</div>';
                    return;
                }
            }

            types.forEach(type => {
                const section = document.createElement('section'); 
                section.className = 'type-section';
                section.innerHTML = `<div class="type-header">${type.toUpperCase()}</div>`;
                
                const container = document.createElement('div'); 
                container.className = 'links-container';
                
                const groupLinks = allLinks.filter(l => l.type === type);
                groupLinks.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
                
                groupLinks.forEach(link => {
                    container.appendChild(createLinkCard(link));
                });

                const addPlaceholder = document.createElement('div');
                addPlaceholder.className = 'add-placeholder';
                addPlaceholder.innerHTML = '[ + ADD ]';
                addPlaceholder.onclick = () => openLinkModal(null, type);
                container.appendChild(addPlaceholder);

                section.appendChild(container);
                content.appendChild(section);
            });
        }

        function createLinkCard(link) {
            const item = document.createElement('div'); 
            item.className = 'link-item';
            let iconHtml = link.icon.startsWith('http') ? `<img src="${link.icon}" style="width:100%;height:100%;object-fit:cover;">` : link.icon.slice(0, 2);

            // 彻底移除下方显示网址排版，改为单行居中对齐结构
            item.innerHTML = `
                <div class="edit-controls">
                    <button class="mini-btn" onclick="event.stopPropagation();openLinkModal(${link.id})">✎</button>
                    <button class="mini-btn del" onclick="event.stopPropagation();deleteLink(${link.id})">×</button>
                </div>
                <div class="link-main-info">
                    <div class="link-icon-container">${iconHtml}</div>
                    <div class="link-comment">${link.comment || '无标题'}</div>
                </div>
            `;

            item.onclick = () => {
                if (isEditMode) return;
                let targetUrl = link.url.startsWith('http') ? link.url : 'http://' + link.url;
                window.open(targetUrl, '_blank');
            };

            if (link.note) {
                const popup = document.getElementById('global-note-popup');
                item.onmouseenter = () => {
                    if (isEditMode) return;
                    popup.innerHTML = `// ACCESS_NOTES:\n${link.note.replace(/\n/g, '<br>')}`;
                    const rect = item.getBoundingClientRect();
                    let left = rect.right + 8;
                    if (left + 260 > window.innerWidth) left = rect.left - 270;
                    popup.style.left = left + 'px'; popup.style.top = rect.top + 'px';
                    popup.style.display = 'block';
                };
                item.onmouseleave = () => {
                    const sense = userSettings.sensitivity || 50;
                    const isMovingFast = Math.abs(mouseTrack.vx) > (1.0 - (sense / 100) * 0.9);
                    const delay = (isMovingFast) ? 300 : 50;
                    setTimeout(() => {
                        if (!popup.matches(':hover') && !item.matches(':hover')) popup.style.display = 'none';
                    }, delay);
                };
            }
            return item;
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('edit-mode-btn');
            btn.innerHTML = isEditMode ? `<i class="fas fa-desktop"></i> 退出管理` : `<i class="fas fa-terminal"></i> 开启管理`;
            document.body.classList.toggle('edit-mode', isEditMode);
            renderLinks();
        }

        function openSettingsModal() {
            document.getElementById('setting-sensitivity').value = userSettings.sensitivity || 50;
            document.getElementById('setting-category-order').value = userSettings.categoryOrder || "";
            document.getElementById('settings-modal').style.display = 'flex';
        }

        async function saveSettings() {
            const newSense = parseInt(document.getElementById('setting-sensitivity').value);
            const newOrder = document.getElementById('setting-category-order').value.trim();
            userSettings.sensitivity = newSense;
            userSettings.categoryOrder = newOrder;
            
            localStorage.setItem('nav_settings', JSON.stringify(userSettings));
            document.getElementById('settings-modal').style.display = 'none';
            renderLinks(); 
            
            try {
                const token = localStorage.getItem('nav_token');
                await fetch(API_USER, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ settings: userSettings })
                });
            } catch(e) { console.log("离线保存本地，网络同步失败"); }
        }

        function toggleNotesSidebar() {
            const sidebar = document.getElementById('notes-sidebar');
            sidebar.classList.toggle('active');
            if (sidebar.classList.contains('active')) loadNotes();
        }

        async function loadNotes() {
            const listContainer = document.getElementById('notes-list');
            const cachedNotes = localStorage.getItem('cached_notes_data');
            if (cachedNotes) {
                try { renderNotesUI(JSON.parse(cachedNotes)); } catch(e){}
            }

            try {
                const res = await fetch(API_NOTES);
                if (!res.ok) throw new Error();
                const freshNotes = await res.json();
                
                if (JSON.stringify(freshNotes) !== cachedNotes) {
                    localStorage.setItem('cached_notes_data', JSON.stringify(freshNotes));
                    renderNotesUI(freshNotes);
                }
            } catch(e) {
                if(!cachedNotes) listContainer.innerHTML = '<p style="color:var(--accent-danger); font-size:12px;">无法连接至云端数据库</p>';
            }
        }

        function renderNotesUI(notes) {
            const listContainer = document.getElementById('notes-list');
            listContainer.innerHTML = '';
            notes.forEach(note => {
                const div = document.createElement('div');
                div.className = 'sidebar-note-item' + (note.is_pinned ? ' pinned' : '');
                div.innerHTML = `
                    <div class="note-item-text">${note.content}</div>
                    <div class="note-item-meta">
                        <span class="note-meta-action" onclick="togglePinNote(${note.id}, '${note.content.replace(/'/g, "\\'")}', ${note.is_pinned})">
                            ${note.is_pinned ? '📌 取消置顶' : '📍 置顶'}
                        </span>
                        <span class="note-meta-action del" onclick="deleteNote(${note.id})">× 删除</span>
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        async function submitNote() {
            const textarea = document.getElementById('note-textarea');
            const content = textarea.value.trim();
            if (!content) return;
            
            await fetch(API_NOTES, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content, is_pinned: 0 })
            });
            textarea.value = '';
            loadNotes();
        }

        async function togglePinNote(id, content, currentPinned) {
            await fetch(API_NOTES, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, content, is_pinned: currentPinned ? 0 : 1 })
            });
            loadNotes();
        }

        async function deleteNote(id) {
            const pwd = prompt('EXEC_DELETE // 请输入管理员密钥验证安全指令:');
            if (pwd === null) return;
            const res = await fetch(API_NOTES, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, password: pwd })
            });
            if (res.ok) loadNotes(); else alert('密钥验证失败');
        }

        function openLinkModal(id = null, prefillType = '') {
            document.getElementById('link-id').value = ''; document.getElementById('link-type').value = prefillType;
            document.getElementById('link-url').value = ''; document.getElementById('link-icon').value = '';
            document.getElementById('link-comment').value = ''; document.getElementById('link-note').value = '';
            document.getElementById('link-sort').value = '0';
            
            if (id) {
                const link = allLinks.find(l => l.id === id);
                if (link) {
                    document.getElementById('link-id').value = link.id; document.getElementById('link-type').value = link.type;
                    document.getElementById('link-url').value = link.url; document.getElementById('link-icon').value = link.icon;
                    document.getElementById('link-comment').value = link.comment; document.getElementById('link-note').value = link.note;
                    document.getElementById('link-sort').value = link.sort_order;
                }
            }
            document.getElementById('link-modal').style.display = 'flex';
        }
        function closeLinkModal() { document.getElementById('link-modal').style.display = 'none'; }
        
        async function submitLink() {
            const id = document.getElementById('link-id').value;
            const token = localStorage.getItem('nav_token');
            const payload = {
                type: document.getElementById('link-type').value.trim(), url: document.getElementById('link-url').value.trim(),
                icon: document.getElementById('link-icon').value.trim(), comment: document.getElementById('link-comment').value.trim(),
                note: document.getElementById('link-note').value.trim(), sort_order: parseInt(document.getElementById('link-sort').value) || 0
            };
            if (!payload.type || !payload.url || !payload.icon) return alert('必备基础配置参数缺失');
            if (id) payload.id = id;

            const res = await fetch(API_LINKS, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            if (res.ok) { closeLinkModal(); loadLinks(); }
        }

        async function deleteLink(id) {
            if (!confirm('确认从边缘节点彻底移除此站点卡片数据？')) return;
            const token = localStorage.getItem('nav_token');
            const res = await fetch(API_LINKS, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ id })
            });
            if (res.ok) loadLinks();
        }

        async function handleAuth() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const resetCode = document.getElementById('auth-reset-code').value.trim();
            const newPwd = document.getElementById('auth-new-pwd').value.trim();
            const msg = document.getElementById('auth-msg');
            
            const payload = { action: authMode, username };
            if (authMode === 'login') { payload.password = password; }
            else if (authMode === 'register') { payload.password = password; payload.reset_code = resetCode; }
            else if (authMode === 'reset') { payload.reset_code = resetCode; payload.new_password = newPwd; }

            try {
                const res = await fetch(API_AUTH, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.success) {
                    if (authMode === 'login') {
                        localStorage.setItem('nav_token', data.token); 
                        localStorage.setItem('nav_user', data.username);
                        if (data.settings) {
                            localStorage.setItem('nav_settings', data.settings);
                            try { userSettings = JSON.parse(data.settings); } catch(e){}
                        }
                        document.getElementById('auth-panel').style.display = 'none';
                        showUI(); loadLinks();
                    } else { alert('安全注册/重置成功，正在返回登录控制台'); switchAuthMode('login'); }
                } else { msg.textContent = `>> ERROR: ${data.error || 'BAD_REQUEST'}`; }
            } catch(e) { msg.textContent = '>> ERROR: NETWORK_TIMEOUT'; }
        }

        function logout() { localStorage.removeItem('nav_token'); localStorage.removeItem('cached_links_data'); localStorage.removeItem('cached_notes_data'); location.reload(); }
    </script>
</body>
</html>
