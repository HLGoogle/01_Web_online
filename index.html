<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console // 健壮导航终端</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 极简暗黑硬核高密度终端风格 --- */
        :root {
            --bg-main: #0d1117; --bg-card: #161b22; --bg-input: #21262d;      
            --border-color: #30363d; --text-main: #c9d1d9; --text-muted: #8b949e;    
            --accent-color: #58a6ff; --accent-green: #2ea44f; --accent-danger: #f85149; 
            --font-mono: 'Fira Code', 'Ubuntu Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: sans-serif, var(--font-mono); }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; font-family: var(--font-mono); font-size: 13px; }
        .status-sync-indicator { font-size: 11px; color: var(--text-muted); background: #1f242c; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border-color); }
        .status-sync-indicator.synced { color: #58a6ff; border-color: #388bfd4d; background: #0d1117; }
        .status-sync-indicator.cached { color: #f0883e; border-color: #f0883e4d; background: #1f1510; }
        .top-controls { display: flex; gap: 10px; }
        .ctrl-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 4px 10px; font-size: 12px; cursor: pointer; border-radius: 4px; font-family: var(--font-mono); display: flex; align-items: center; gap: 6px; }
        .ctrl-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
        body:not(.logged-in) .top-controls { display: none; }
        
        #auth-panel { max-width: 400px; margin: 100px auto; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 30px; width: 100%; }
        .auth-title { font-family: var(--font-mono); font-size: 16px; margin-bottom: 20px; text-align: center; color: var(--accent-color); }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
        .form-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
        .form-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 4px; padding: 8px 12px; color: var(--text-main); font-size: 14px; outline: none; }
        .auth-switch { text-align: center; font-size: 12px; margin-top: 15px; color: var(--text-muted); }
        .auth-switch span { color: var(--accent-color); cursor: pointer; }
        
        #content { max-width: 1400px; margin: 0 auto; width: 100%; display: none; }
        body.logged-in #content { display: block; }
        .type-section { margin-bottom: 25px; }
        .type-header { font-family: var(--font-mono); font-size: 13px; color: var(--accent-color); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .type-header::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
        .links-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 135px)); gap: 10px; }
        
        .link-item { position: relative; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 4px; padding: 10px; cursor: pointer; display: flex; align-items: center; height: 46px; }
        .link-item:hover { border-color: var(--accent-color); }
        .link-main-info { display: flex; align-items: center; gap: 8px; width: 100%; overflow: hidden; }
        
        .link-icon-container { width: 24px; height: 24px; border-radius: 4px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .link-icon-container img { width: 100%; height: 100%; object-fit: cover; }
        .text-icon-wrapper { font-size: 11px; font-weight: bold; color: var(--accent-color); font-family: var(--font-mono); text-align: center; }
        .link-comment { font-size: 12px; font-weight: bold; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        
        .edit-controls { display: none; position: absolute; top: 2px; right: 2px; gap: 2px; background: rgba(22, 27, 34, 0.9); padding: 2px; border-radius: 3px; }
        .link-item:hover .edit-controls { display: flex; }
        body:not(.edit-mode) .edit-controls { display: none !important; }
        .mini-btn { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted); width: 16px; height: 16px; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 2px; }
        .mini-btn:hover { color: #fff; border-color: var(--accent-color); }
        .mini-btn.del:hover { border-color: var(--accent-danger); color: var(--accent-danger); }
        .mini-btn.upload:hover { border-color: var(--accent-green); color: var(--accent-green); }
        
        .add-placeholder { border: 1px dashed var(--border-color); background: transparent; display: none; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); height: 46px; border-radius: 4px; cursor: pointer; }
        body.edit-mode .add-placeholder { display: flex; }
        
        .note-popup { display: none; position: fixed; width: 260px; background: #161b22f2; backdrop-filter: blur(8px); border: 1px solid var(--accent-color); padding: 12px; border-radius: 6px; z-index: 9999; font-family: var(--font-mono); font-size: 11px; color: #88fa88; box-shadow: 0 4px 20px rgba(0,0,0,0.5); white-space: pre-wrap; word-break: break-all; pointer-events: none; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(2px); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; width: 360px; }
        .modal-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 8px; }
    </style>
</head>
<body>

    <header>
        <div><span class="status-sync-indicator" id="sync-status">⚡ 校验边缘终端...</span></div>
        <div class="top-controls">
            <button class="ctrl-btn" style="color: var(--accent-color); border-color: #388bfd4d;" onclick="window.open('/code-grid.html', '_blank')"><i class="fas fa-code"></i> 代码画布</button>
            <button class="ctrl-btn" onclick="openSettingsModal()"><i class="fas fa-sliders-h"></i> 全局设置</button>
            <button class="ctrl-btn" onclick="toggleEditMode()" id="edit-mode-btn"><i class="fas fa-terminal"></i> 开启管理</button>
            <button class="ctrl-btn btn-logout" onclick="logout()" id="logout-btn"><i class="fas fa-power-off"></i> 注销</button>
        </div>
    </header>

    <div id="auth-panel">
        <div class="auth-title">// IDENTITY_VERIFICATION</div>
        <div class="form-group">
            <label class="form-label">Username / 用户名</label>
            <input type="text" id="auth-username" class="form-input">
        </div>
        <div class="form-group" id="group-password">
            <label class="form-label">Password / 密码</label>
            <input type="password" id="auth-password" class="form-input">
        </div>
        <div class="form-group" id="group-reset-code" style="display:none;">
            <label class="form-label">Reset Code / 安全重置码</label>
            <input type="text" id="auth-reset-code" class="form-input">
        </div>
        <div class="form-group" id="group-new-pwd" style="display:none;">
            <label class="form-label">New Password / 新密码</label>
            <input type="password" id="auth-new-pwd" class="form-input">
        </div>
        <button class="ctrl-btn" style="width:100%; padding: 8px; margin-top:10px;" id="auth-submit-btn" onclick="handleAuth()">执行登录</button>
        <div class="auth-switch">
            <span onclick="switchAuthMode('login')">登录</span> | <span onclick="switchAuthMode('register')">注册</span> | <span onclick="switchAuthMode('reset')">找回密码</span>
        </div>
        <p id="auth-msg" style="color:var(--accent-danger); font-size:11px; text-align:center; margin-top:10px;"></p>
    </div>

    <div id="content">
        <div id="links-render-zone"></div>
    </div>

    <div id="global-note-popup" class="note-popup"></div>
    <input type="file" id="hidden-icon-uploader" accept="image/*" style="display: none;" onchange="handleIconFileSelected(this)">

    <div id="link-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="auth-title" id="link-modal-title">// LINK_CONFIG</div>
            <input type="hidden" id="link-id">
            <div class="form-group"><label class="form-label">// CATEGORY / 分类名称</label><input type="text" id="link-type" class="form-input"></div>
            <div class="form-group"><label class="form-label">// TARGET_URL / 目标网址</label><input type="text" id="link-url" class="form-input"></div>
            <div class="form-group"><label class="form-label">// ICON_SOURCE / 图标配置</label><input type="text" id="link-icon" class="form-input"></div>
            <div class="form-group"><label class="form-label">// DISPLAY_NAME / 卡片标题</label><input type="text" id="link-comment" class="form-input"></div>
            <div class="form-group"><label class="form-label">// SECRETS_NOTE / 注释信息</label><textarea id="link-note" class="form-input" style="height:60px; resize:none;"></textarea></div>
            <div class="form-group"><label class="form-label">// SORT_WEIGHT / 排序权重</label><input type="number" id="link-sort" class="form-input" value="0"></div>
            <div class="modal-footer">
                <button class="ctrl-btn" onclick="closeLinkModal()">取消</button>
                <button class="ctrl-btn" style="color:var(--accent-color); border-color:var(--accent-color);" onclick="submitLink()">应用配置</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="auth-title">// GLOBAL_SETTINGS</div>
            <div class="form-group" style="border-bottom: 1px dashed var(--border-color); padding-bottom: 12px;">
                <label class="form-label">// SENSITIVITY / 悬浮灵敏度 (保护：已切换为极速直显机制)</label>
                <input type="range" id="setting-sensitivity" min="1" max="100" value="50" style="width: 100%; opacity: 0.5;">
            </div>
            <div class="form-group">
                <label class="form-label">// CATEGORY_ORDER / 分类展示优先级顺序</label>
                <input type="text" id="setting-category-order" class="form-input" placeholder="用逗号隔开">
            </div>
            <div class="modal-footer">
                <button class="ctrl-btn" onclick="document.getElementById('settings-modal').style.display='none'">取消</button>
                <button class="ctrl-btn" style="color:var(--accent-color); border-color:var(--accent-color);" onclick="saveSettings()">确认保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_AUTH = '/api/auth'; const API_LINKS = '/api/links'; const API_USER = '/api/user'; const API_CODE_GRID = '/api/code-grid';
        const CACHE_NAME = 'nav-icon-assets-v1';
        let authMode = 'login'; let allLinks = []; let isEditMode = false;
        let userSettings = { sensitivity: 50, categoryOrder: "" }; let currentTargetLinkId = null;

        // 🆕 注入主页浏览器 Service Worker 本地离线强拦截引擎（网络尚未发出前即完成本地网页框架载入）
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('>> 主页离线防白板引擎部署就绪: ', reg.scope))
                    .catch(err => console.log('>> 主页离线引擎安装失败: ', err));
            });
        }

        window.onload = function() {
            const token = localStorage.getItem('nav_token');
            if (token) {
                document.getElementById('auth-panel').style.display = 'none';
                const cachedSettings = localStorage.getItem('nav_settings');
                if (cachedSettings) { try { userSettings = JSON.parse(cachedSettings); } catch(e){} }
                showUI(); 
                loadLinks(); 
            }
        };

        function showUI() {
            const user = localStorage.getItem('nav_user');
            document.body.classList.add('logged-in');
            document.getElementById('logout-btn').innerHTML = `<i class="fas fa-power-off"></i> [ ${user.toUpperCase()} ] 注销`;
        }

        function switchAuthMode(mode) {
            authMode = mode;
            const title = document.getElementById('auth-title');
            const resetGroup = document.getElementById('group-reset-code');
            const pwdGroup = document.getElementById('group-new-pwd');
            const oldPwdGroup = document.getElementById('auth-password').parentElement;
            document.getElementById('auth-msg').textContent = '';
            if (mode === 'login') { title.textContent = '// IDENTITY_VERIFICATION'; resetGroup.style.display = 'none'; pwdGroup.style.display = 'none'; oldPwdGroup.style.display = 'block'; }
            else if (mode === 'register') { title.textContent = '// REGISTER_NEW_ACCOUNT'; resetGroup.style.display = 'block'; pwdGroup.style.display = 'none'; oldPwdGroup.style.display = 'block'; }
            else if (mode === 'reset') { title.textContent = '// RESET_CREDENTIALS'; oldPwdGroup.style.display = 'none'; resetGroup.style.display = 'block'; pwdGroup.style.display = 'block'; }
        }

        // 🆕 升级双轨并行数据流逻辑：本地强缓存0延迟速显，后台静默向外联网同步
        async function loadLinks() {
            const token = localStorage.getItem('nav_token');
            const indicator = document.getElementById('sync-status');
            const cachedLinks = localStorage.getItem('cached_links_data');
            
            // 轨道一：一毫秒内无缝调取本地强缓存渲染画面，不让页面产生任何白板与转圈等待
            if (cachedLinks) {
                try {
                    allLinks = JSON.parse(cachedLinks);
                    renderLinks(); 
                    indicator.className = "status-sync-indicator cached";
                    indicator.textContent = "⚠️ 离线浏览 // 维持本地强缓存运行";
                } catch(e){}
            }

            // 轨道二：后台静默尝试跨网握手云端数据库，完全不打扰用户当前在界面的点击行为
            try {
                const res = await fetch(API_LINKS, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.status === 401) { logout(); return; }
                const freshLinks = await res.json();

                // 云端对齐：如果网络畅通抓到了最新的资产，且跟本地缓存不一致，默默将新资产同步写入存储并刷新
                if (JSON.stringify(freshLinks) !== cachedLinks) {
                    allLinks = freshLinks;
                    localStorage.setItem('cached_links_data', JSON.stringify(freshLinks));
                    renderLinks(); 
                }
                indicator.className = "status-sync-indicator synced";
                indicator.textContent = "⚙️ 系统就绪 // 已实时对齐 D1 数据库独立账号层";
            } catch (err) {
                // 如果外网延迟过高或者断网崩溃，由于刚才画面已经秒开了，直接不打扰用户默默死守本地数据
                console.log(">> 后台联网握手挂起或高延迟超时，静默维持本地高速强缓存运行。");
            }
        }

        function renderLinks() {
            const contentZone = document.getElementById('links-render-zone'); contentZone.innerHTML = '';
            let types = [...new Set(allLinks.map(l => l.type))];
            const orderStr = userSettings.categoryOrder || "";
            const priorityList = orderStr.split(/[,，]/).map(s => s.trim()).filter(s => s);
            if (priorityList.length > 0) {
                types.sort((a, b) => {
                    const indexA = priorityList.indexOf(a), indexB = priorityList.indexOf(b);
                    if (indexA !== -1 && indexB !== -1) return indexA - indexB;
                    return indexA !== -1 ? -1 : (indexB !== -1 ? 1 : 0);
                });
            }
            if (types.length === 0 && allLinks.length === 0) {
                if (isEditMode) types.push('常用');
                else { contentZone.innerHTML = '<div style="text-align:center;padding:50px;color:var(--text-muted);font-family:var(--font-mono)">[ END_POINT_EMPTY ] <br>环境就绪，请开启管理端录入数据</div>'; return; }
            }
            types.forEach(type => {
                const section = document.createElement('section'); section.className = 'type-section';
                section.innerHTML = `<div class="type-header">${type.toUpperCase()}</div>`;
                const container = document.createElement('div'); container.className = 'links-container';
                const groupLinks = allLinks.filter(l => l.type === type);
                groupLinks.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
                
                groupLinks.forEach(link => { container.appendChild(createLinkCard(link)); });
                const addPlaceholder = document.createElement('div'); addPlaceholder.className = 'add-placeholder';
                addPlaceholder.innerHTML = '[ + ADD ]'; addPlaceholder.onclick = () => openLinkModal(null, type);
                container.appendChild(addPlaceholder);
                section.appendChild(container); contentZone.appendChild(section);
            });
        }

        function createLinkCard(link) {
            const item = document.createElement('div'); item.className = 'link-item';
            const imgId = `img-node-${link.id}`;
            let iconHtml = '';
            
            if (link.icon && link.icon.startsWith('user_')) {
                iconHtml = `<img id="${imgId}" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><rect width='24' height='24' fill='%2321262d'/></svg>">`;
                fetchAndCacheIcon(`/api/icon/${link.icon}`, imgId);
            } else {
                const textIcon = link.icon ? link.icon.slice(0, 2) : (link.comment || '无').slice(0, 2);
                iconHtml = `<span class="text-icon-wrapper">${textIcon}</span>`;
            }

            item.innerHTML = `
                <div class="edit-controls">
                    <button class="mini-btn upload" title="上传专属KV图片" onclick="event.stopPropagation();triggerIconUpload(${link.id})"><i class="fas fa-upload"></i></button>
                    <button class="mini-btn" onclick="event.stopPropagation();openLinkModal(${link.id})">✎</button>
                    <button class="mini-btn del" onclick="event.stopPropagation();deleteLink(${link.id})">×</button>
                </div>
                <div class="link-main-info">
                    <div class="link-icon-container">${iconHtml}</div>
                    <div class="link-comment">${link.comment || '无标题'}</div>
                </div>
            `;

            item.onclick = () => { if (isEditMode) return; window.open(link.url.startsWith('http') ? link.url : 'http://' + link.url, '_blank'); };
            
            if (link.note) {
                const popup = document.getElementById('global-note-popup');
                item.onmouseenter = () => {
                    if (isEditMode) return;
                    popup.innerHTML = `//  备注:\n${link.note.replace(/\n/g, '<br>')}`;
                    const rect = item.getBoundingClientRect(); 
                    let left = rect.right + 8;
                    if (left + 260 > window.innerWidth) left = rect.left - 270;
                    popup.style.left = left + 'px'; popup.style.top = rect.top + 'px'; popup.style.display = 'block';
                };
                item.onmouseleave = () => { popup.style.display = 'none'; };
            }
            return item;
        }

        async function fetchAndCacheIcon(url, targetImgId) {
            if (!('caches' in window)) {
                const imgNode = document.getElementById(targetImgId);
                if (imgNode) imgNode.src = url;
                return;
            }
            const cache = await caches.open(CACHE_NAME);
            const cachedResponse = await cache.match(url);
            const mountAndReleaseBlob = async (responseObj) => {
                const blob = await responseObj.blob();
                const blobUrl = URL.createObjectURL(blob);
                const imgNode = document.getElementById(targetImgId);
                if (imgNode) { imgNode.src = blobUrl; imgNode.onload = () => { URL.revokeObjectURL(blobUrl); }; }
            };

            if (cachedResponse) {
                await mountAndReleaseBlob(cachedResponse);
                fetch(url + '?_ts=' + Date.now()).then(networkResponse => {
                    if (networkResponse.status === 200) { cache.put(url, networkResponse); }
                }).catch(()=>{});
            } else {
                try {
                    const response = await fetch(url);
                    if (response.status === 200) { await cache.put(url, response.clone()); await mountAndReleaseBlob(response); }
                } catch(e) {
                    const imgNode = document.getElementById(targetImgId);
                    if (imgNode) imgNode.src = url;
                }
            }
        }

        function triggerIconUpload(linkId) { currentTargetLinkId = linkId; document.getElementById('hidden-icon-uploader').click(); }

        async function handleIconFileSelected(inputElement) {
            const file = inputElement.files[0]; if (!file || !currentTargetLinkId) return;
            if (file.size > 2 * 1024 * 1024) { alert("安全拦截：图标文件过大（不可超过 2MB），已终止直传！"); inputElement.value = ''; return; }

            const token = localStorage.getItem('nav_token');
            document.getElementById('sync-status').textContent = "⏳ 正在直传图片资产至 Workers KV 空间...";
            try {
                const res = await fetch(`/api/user/upload-icon?name=${encodeURIComponent(file.name)}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: file });
                if (!res.ok) throw new Error("服务器拒绝接收");
                const uploadResult = await res.json();
                if (uploadResult.success) {
                    const targetLink = allLinks.find(l => l.id === currentTargetLinkId);
                    if (targetLink) {
                        targetLink.icon = uploadResult.kvKey;
                        await fetch(API_LINKS, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(targetLink) });
                        if ('caches' in window) { const cache = await caches.open(CACHE_NAME); await cache.delete(`/api/icon/${uploadResult.kvKey}`); }
                        loadLinks();
                    }
                } else { alert('直传终止: ' + uploadResult.error); }
            } catch (e) { alert('存储资产失败: ' + e.message); }
            finally { inputElement.value = ''; currentTargetLinkId = null; }
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('edit-mode-btn').innerHTML = isEditMode ? `<i class="fas fa-desktop"></i> 退出管理` : `<i class="fas fa-terminal"></i> 开启管理`;
            document.body.classList.toggle('edit-mode', isEditMode); renderLinks();
        }
        function openSettingsModal() {
            document.getElementById('setting-sensitivity').value = userSettings.sensitivity || 50;
            document.getElementById('setting-category-order').value = userSettings.categoryOrder || "";
            document.getElementById('settings-modal').style.display = 'flex';
        }
        async function saveSettings() {
            userSettings.sensitivity = parseInt(document.getElementById('setting-sensitivity').value);
            userSettings.categoryOrder = document.getElementById('setting-category-order').value.trim();
            localStorage.setItem('nav_settings', JSON.stringify(userSettings));
            document.getElementById('settings-modal').style.display = 'none'; renderLinks();
            try {
                const token = localStorage.getItem('nav_token');
                await fetch(API_USER, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ settings: userSettings }) });
            } catch(e){}
        }
        function openLinkModal(id = null, prefillType = '') {
            document.getElementById('link-id').value = ''; document.getElementById('link-type').value = prefillType;
            document.getElementById('link-url').value = ''; document.getElementById('link-icon').value = '';
            document.getElementById('link-comment').value = ''; document.getElementById('link-note').value = '';
            document.getElementById('link-sort').value = '0';
            if (id) {
                const link = allLinks.find(l => l.id === id);
                if (link) {
                    document.getElementById('link-id').value = link.id; document.getElementById('link-type').value = link.type;
                    document.getElementById('link-url').value = link.url; document.getElementById('link-icon').value = link.icon;
                    document.getElementById('link-comment').value = link.comment; document.getElementById('link-note').value = link.note;
                    document.getElementById('link-sort').value = link.sort_order;
                }
            }
            document.getElementById('link-modal').style.display = 'flex';
        }
        function closeLinkModal() { document.getElementById('link-modal').style.display = 'none'; }
        async function submitLink() {
            const id = document.getElementById('link-id').value; const token = localStorage.getItem('nav_token');
            const payload = {
                type: document.getElementById('link-type').value.trim(), url: document.getElementById('link-url').value.trim(),
                icon: document.getElementById('link-icon').value.trim(), comment: document.getElementById('link-comment').value.trim(),
                note: document.getElementById('link-note').value.trim(), sort_order: parseInt(document.getElementById('link-sort').value) || 0
            };
            if (!payload.type || !payload.url) return alert('必填参数缺失');
            if (id) payload.id = id;
            const res = await fetch(API_LINKS, { method: id ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(payload) });
            if (res.ok) { closeLinkModal(); loadLinks(); }
        }
        async function deleteLink(id) {
            if (!confirm('确认要物理注销此卡片记录？')) return;
            const token = localStorage.getItem('nav_token');
            const res = await fetch(API_LINKS, { method: 'DELETE', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ id }) });
            if (res.ok) loadLinks();
        }
        async function handleAuth() {
            const username = document.getElementById('auth-username').value.trim(); const password = document.getElementById('auth-password').value.trim();
            const resetCode = document.getElementById('auth-reset-code').value.trim(); const newPwd = document.getElementById('auth-new-pwd').value.trim();
            const msg = document.getElementById('auth-msg'); const payload = { action: authMode, username };
            if (authMode === 'login') { payload.password = password; }
            else if (authMode === 'register') { payload.password = password; payload.reset_code = resetCode; }
            else if (authMode === 'reset') { payload.reset_code = resetCode; payload.new_password = newPwd; }
            try {
                const res = await fetch(API_AUTH, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.success) {
                    if (authMode === 'login') {
                        localStorage.setItem('nav_token', data.token); localStorage.setItem('nav_user', data.username);
                        if (data.settings) { localStorage.setItem('nav_settings', data.settings); try { userSettings = JSON.parse(data.settings); } catch(e){} }
                        document.getElementById('auth-panel').style.display = 'none'; showUI(); loadLinks();
                    } else { alert('指令验证执行通过'); switchAuthMode('login'); }
                } else { msg.textContent = `>> ERROR: ${data.error || 'BAD_REQUEST'}`; }
            } catch(e) { msg.textContent = '>> ERROR: CONN_TIMEOUT'; }
        }
        function logout() { localStorage.removeItem('nav_token'); localStorage.removeItem('nav_settings'); localStorage.removeItem('cached_links_data'); location.reload(); }
    </script>
</body>
</html>
