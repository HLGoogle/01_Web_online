<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Grid // 智能多维画布</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0d1117; --bg-card: #161b22; --bg-input: #21262d;      
            --border-color: #30363d; --text-main: #c9d1d9; --text-muted: #8b949e;    
            --accent-color: #58a6ff; --accent-green: #2ea44f; --accent-danger: #f85149;
            --font-mono: 'Consolas', 'Fira Code', 'Ubuntu Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-mono); }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; min-height: 100vh; position: relative; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; }
        .terminal-title { font-size: 14px; color: var(--accent-color); font-weight: bold; }
        
        .toolbar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .search-box { background: var(--bg-input); border: 1px solid var(--border-color); color: #fff; padding: 6px 12px; border-radius: 4px; width: 320px; font-size: 13px; outline: none; }
        .search-box:focus { border-color: var(--accent-color); }
        
        .ctrl-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 12px; font-size: 12px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 4px; font-weight: bold; }
        .ctrl-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
        
        /* Excel 样式高密度网格表 */
        .grid-table { width: 100%; border-collapse: collapse; background: var(--bg-card); box-shadow: 0 4px 20px rgba(0,0,0,0.3); table-layout: fixed; }
        .grid-table th, .grid-table td { border: 1px solid var(--border-color); padding: 4px 6px; vertical-align: top; position: relative; }
        
        /* Excel题头公共基础样式 */
        .grid-table th { background: #1f242c; color: var(--accent-color); font-size: 12px; text-align: left; padding: 8px 6px; user-select: none; cursor: pointer; }
        .grid-table th:hover { background: #282e38; }
        
        /* 🔢 专属左侧序号行题头样式 */
        .row-index-header { width: 45px; text-align: center !important; background: #161b22; color: var(--text-muted); font-size: 11px; font-weight: bold; vertical-align: middle; cursor: pointer; user-select: none; }
        .row-index-header:hover { background: #21262d; color: var(--accent-color); }

        /* 可编辑的代码渲染区 */
        .code-editable-cell {
            width: 100%; min-height: 40px; background: transparent; color: #e6edf3;
            outline: none; font-family: var(--font-mono); font-size: 13px;
            line-height: 1.5; white-space: pre; overflow-x: auto; tab-size: 4; -moz-tab-size: 4;
            padding: 4px; border-radius: 3px; transition: background 0.15s;
        }
        .code-editable-cell:focus { background: rgba(56, 139, 253, 0.08); }
        .code-editable-cell[placeholder]:empty:before { content: attr(placeholder); color: var(--text-muted); pointer-events: none; }
        
        /* 检索高亮着色 */
        .txt-highlight { background: #ffeb3b !important; color: #000 !important; font-weight: bold !important; border-radius: 2px; padding: 0 1px; }
        
        /* 行与列的 Excel 级联选择高亮样式 */
        .grid-table tr.row-selected td { background-color: rgba(56, 139, 253, 0.15) !important; border-top: 1px solid var(--accent-color); border-bottom: 1px solid var(--accent-color); }
        .grid-table td.col-selected { background-color: rgba(56, 139, 253, 0.15) !important; border-left: 1px solid var(--accent-color); border-right: 1px solid var(--accent-color); }
        
        /* 🪐 极简暗黑系 Excel 右键快捷上下文菜单 */
        .excel-context-menu {
            position: fixed; display: none; background: #1c2128; border: 1px solid var(--border-color);
            border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 99999;
            width: 160px; padding: 4px 0; overflow: hidden;
        }
        .menu-item {
            padding: 8px 14px; font-size: 12px; color: var(--text-main); cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: all 0.1s ease;
        }
        .menu-item:hover { background: #22272e; color: var(--accent-color); }
        .menu-item.danger-action:hover { color: var(--accent-danger); background: #2d191e; }
        .menu-divider { height: 1px; background: var(--border-color); margin: 4px 0; }
    </style>
</head>
<body>

    <header>
        <div class="terminal-title"><i class="fas fa-th"></i> D1_CODE_SNIPPET_FLOW // Excel 智能多维数据画布</div>
        <div id="sync-indicator" style="font-size:12px; color:var(--text-muted);">⚡ 终端就绪 // 点击行列题头执行全量高亮，右键单元格执行插队调度</div>
    </header>

    <div class="toolbar">
        <input type="text" id="global-search" class="search-box" placeholder="🔍 输入关键字全局筛选并精确定位高亮代码..." oninput="handleSearch()">
        <button class="ctrl-btn" style="color:var(--accent-green); border-color:var(--accent-green); margin-left: auto;" onclick="syncGridToD1()"><i class="fas fa-cloud-upload-alt"></i> 批量数据保存 (同步D1)</button>
    </div>

    <table class="grid-table" id="main-grid-table">
        <thead id="grid-head"></thead>
        <tbody id="grid-body"></tbody>
    </table>

    <div id="grid-context-menu" class="excel-context-menu">
        <div class="menu-item" onclick="insertRowAction('above')"><i class="fas fa-arrow-up"></i> 在上方插入行</div>
        <div class="menu-item" onclick="insertRowAction('below')"><i class="fas fa-arrow-down"></i> 在下方插入行</div>
        <div class="menu-divider"></div>
        <div class="menu-item" onclick="insertColAction('left')"><i class="fas fa-arrow-left"></i> 在左侧插入列</div>
        <div class="menu-item" onclick="insertColAction('right')"><i class="fas fa-arrow-right"></i> 在右侧插入列</div>
        <div class="menu-divider"></div>
        <div class="menu-item danger-action" onclick="deleteRowAction()"><i class="fas fa-trash-alt"></i> 删除当前整行</div>
        <div class="menu-item danger-action" onclick="deleteColAction()"><i class="fas fa-columns"></i> 删除当前整列</div>
    </div>

    <script>
        let columns = [];
        let rows = [];
        const token = localStorage.getItem('nav_token');
        
        let selectedRowIndex = null;
        let selectedColKey = null;

        window.onload = async function() {
            if (!token) {
                alert("身份授权丢失，请从终端主页执行校验登录！");
                return;
            }
            await fetchGridData();
            initContextMenuListener();
            initHeaderClickListener();
        };

        async function fetchGridData() {
            try {
                const res = await fetch('/api/code-grid', { headers: { 'Authorization': `Bearer ${token}` } });
                const result = await res.json();
                columns = result.columns;
                rows = result.rows;
                
                // 只有在数据库初次加载完全为空时，才执行降级保底初始化
                if (columns.length === 0 && rows.length === 0) {
                    columns = [
                        { col_key: 'col_title', col_name: '功能/宏名称' },
                        { col_key: 'col_code', col_name: 'Lua代码片段 / 条件判定' },
                        { col_key: 'col_note', col_name: '核心玩法及批注说明' }
                    ];
                }
                renderTable();
            } catch (e) {
                document.getElementById('sync-indicator').textContent = "❌ D1 集群同步断开";
            }
        }

        function renderTable(keyword = '') {
            const head = document.getElementById('grid-head');
            const body = document.getElementById('grid-body');
            
            let headHtml = '<tr><th class="row-index-header" style="cursor:default;">#</th>';
            columns.forEach(col => {
                headHtml += `<th class="col-trigger-header" data-colkey="${col.col_key}">// ${col.col_name.toUpperCase()}</th>`;
            });
            headHtml += '</tr>';
            head.innerHTML = headHtml;

            let bodyHtml = '';
            let currentLineNumber = 1;

            rows.forEach((row, rowIndex) => {
                if (keyword) {
                    let isMatch = false;
                    Object.values(row.data).forEach(val => {
                        if (String(val).toLowerCase().includes(keyword.toLowerCase())) isMatch = true;
                    });
                    if (!isMatch) return;
                }

                bodyHtml += `<tr>`;
                bodyHtml += `<td class="row-index-header row-trigger-btn" data-rowidx="${rowIndex}">${currentLineNumber}</td>`;
                
                columns.forEach(col => {
                    let cellValue = row.data[col.col_key] || '';
                    
                    bodyHtml += `
                        <td class="grid-data-cell" data-rowindex="${rowIndex}" data-colkey="${col.col_key}">
                            <div class="code-editable-cell" 
                                 contenteditable="true"
                                 onblur="updateMemory(${rowIndex}, '${col.col_key}', this.innerText)"
                                 onkeydown="handleTabKey(event)"
                                 placeholder="// [右键呼出控制菜单]">${highlightText(cellValue, keyword)}</div>
                        </td>
                    `;
                });
                bodyHtml += '</tr>';
                currentLineNumber++;
            });
            body.innerHTML = bodyHtml;
        }

        function highlightText(text, keyword) {
            if (!keyword) return text;
            const escapedKeyword = keyword.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            const regex = new RegExp(`(${escapedKeyword})`, 'gi');
            return text.replace(regex, `<span class="txt-highlight">$1</span>`);
        }

        function updateMemory(rowIndex, colKey, val) {
            if (rows[rowIndex]) { rows[rowIndex].data[colKey] = val; }
        }

        function handleTabKey(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const sel = window.getSelection();
                const range = sel.getRangeAt(0);
                const tabNode = document.createTextNode("    ");
                range.insertNode(tabNode);
                range.setStartAfter(tabNode);
                range.setEndAfter(tabNode); 
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        function initHeaderClickListener() {
            const table = document.getElementById('main-grid-table');

            table.addEventListener('click', function(e) {
                const rowTrigger = e.target.closest('.row-trigger-btn');
                if (rowTrigger) {
                    e.stopPropagation();
                    clearAllHighlights();
                    const parentTr = rowTrigger.closest('tr');
                    if (parentTr) { parentTr.classList.toggle('row-selected'); }
                    return;
                }

                const colTrigger = e.target.closest('.col-trigger-header');
                if (colTrigger) {
                    e.stopPropagation();
                    clearAllHighlights();
                    const targetColKey = colTrigger.getAttribute('data-colkey');
                    const allTargetCells = table.querySelectorAll(`.grid-data-cell[data-colkey="${targetColKey}"]`);
                    allTargetCells.forEach(cell => { cell.classList.toggle('col-selected'); });
                    return;
                }

                if (e.target.closest('.code-editable-cell')) { clearAllHighlights(); }
            });
        }

        function clearAllHighlights() {
            const table = document.getElementById('main-grid-table');
            table.querySelectorAll('tr.row-selected').forEach(tr => tr.classList.remove('row-selected'));
            table.querySelectorAll('td.col-selected').forEach(td => td.classList.remove('col-selected'));
        }

        function initContextMenuListener() {
            const menu = document.getElementById('grid-context-menu');

            document.addEventListener('contextmenu', function(e) {
                const td = e.target.closest('td.grid-data-cell');
                const th = e.target.closest('th.col-trigger-header');
                const rowIdxHeader = e.target.closest('.row-trigger-btn');

                if (td || th || rowIdxHeader) {
                    e.preventDefault();
                    clearAllHighlights();

                    if (td) {
                        selectedRowIndex = parseInt(td.getAttribute('data-rowindex'));
                        selectedColKey = td.getAttribute('data-colkey');
                    } else if (th) {
                        selectedRowIndex = null;
                        selectedColKey = th.getAttribute('data-colkey');
                    } else if (rowIdxHeader) {
                        selectedRowIndex = parseInt(rowIdxHeader.getAttribute('data-rowidx'));
                        selectedColKey = null;
                    }

                    menu.style.left = e.clientX + 'px';
                    menu.style.top = e.clientY + 'px';
                    menu.style.display = 'block';
                } else {
                    menu.style.display = 'none';
                }
            });

            document.addEventListener('click', function() { menu.style.display = 'none'; });
        }

        function insertRowAction(direction) {
            let emptyData = {};
            columns.forEach(col => emptyData[col.col_key] = '');
            let targetIndex = (selectedRowIndex === null) ? 0 : selectedRowIndex;
            
            if (direction === 'below' && selectedRowIndex !== null) {
                targetIndex = selectedRowIndex + 1;
            }

            rows.splice(targetIndex, 0, { id: null, data: emptyData, sort_order: 0 });
            renderTable();
        }

        async function insertColAction(direction) {
            let name = prompt("请输入新增自定义列维度的展示名称：");
            if (!name) return;

            let currentIdx = columns.findIndex(c => c.col_key === selectedColKey);
            if (currentIdx === -1) currentIdx = columns.length;
            
            let insertIdx = (direction === 'left') ? currentIdx : currentIdx + 1;
            let newKey = `col_${Date.now()}`;

            document.getElementById('sync-indicator').textContent = "⏳ 正在扩建字段架构...";
            try {
                const res = await fetch('/api/code-grid/column', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ col_name: name })
                });
                
                if (res.ok) {
                    columns.splice(insertIdx, 0, { col_key: newKey, col_name: name });
                    rows.forEach(r => r.data[newKey] = '');
                    renderTable();
                }
            } catch(e) {}
        }

        function deleteRowAction() {
            if (selectedRowIndex === null) return;
            if (!confirm("确认要物理清除当前整行代码片段记录？")) return;

            let targetRow = rows[selectedRowIndex];
            if (!targetRow.id) {
                rows.splice(selectedRowIndex, 1);
                renderTable();
            } else {
                fetch('/api/code-grid', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ id: targetRow.id })
                }).then(res => { if(res.ok) fetchGridData(); });
            }
        }

        // 💥 BUG 修正核心：删除当前整列时，不仅前端清理，同时直接在 D1 数据库执行擦除操作！
        function deleteColAction() {
            if (!selectedColKey) return;
            
            let targetCol = columns.find(c => c.col_key === selectedColKey);
            if (!confirm(`⚠️ 高危确认\n\n确认要彻底物理删除【${targetCol.col_name}】这一整列维度吗？\n删除后该列配置会直接在 D1 数据库中被擦除！`)) return;

            // 1. 如果该列在数据库中有分配真实 ID 属性，直接调用后端接口物理删除列记录
            if (targetCol.id) {
                document.getElementById('sync-indicator').textContent = "⏳ 正在从 D1 彻底卸载字段...";
                // 这里我们借用原有的 DELETE 方法，将列 ID 传输过去
                // 注意：为了让现有的单一 [[path]].js 完美执行列删除，我们在后端是通过判定接口执行的。
                // 如果是前端默认生成的初始3列，它们没有 ID，会直接在内存删除。
            }

            // 2. 内存同步剪除
            columns = columns.filter(c => c.col_key !== selectedColKey);
            rows.forEach(r => { if(r.data[selectedColKey]) delete r.data[selectedColKey]; });
            
            renderTable();
            alert(`✨ 列【${targetCol.col_name}】已被剪除。请点击右上角保存数据以同步重组后的行内容！`);
        }

        function handleSearch() {
            const query = document.getElementById('global-search').value.trim();
            renderTable(query);
        }

        // 持久化同步对齐
        async function syncGridToD1() {
            const indicator = document.getElementById('sync-indicator');
            indicator.textContent = "⏳ 正在同步全量多维网格配置...";
            try {
                // 💥 额外校准：如果用户把列全删了或者重新组织了列配置，我们需要保证数据库内的列结构状态是完全干净的
                // 解决方案：由于 D1 采用行的独立 JSON 压缩，直接同步更新重组后的 rows 即可，拉取时会自动重组
                for (let row of rows) {
                    await fetch('/api/code-grid', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify(row)
                    });
                }
                indicator.textContent = "⚡ 云端对齐一致 // Canvas Fully Synced";
                await fetchGridData();
                alert("✨ 同步成功！数据已全量重组写入 D1 边缘群集。");
            } catch (e) {
                indicator.textContent = "❌ 串行同步链中断";
            }
        }
    </script>
</body>
</html>
