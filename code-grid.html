<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Stream Canvas // 流式记事终端</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d1117; --bg-card: #161b22; --accent-color: #58a6ff; --accent-danger: #f85149; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }
        body { background-color: var(--bg-main); color: #c9d1d9; padding: 10px; }
        
        .note-stream-list { display: flex; flex-direction: column; gap: 4px; }
        
        /* 🎯 记事卡片：极致紧凑 */
        .note-strip-card { 
            display: flex; gap: 8px; background: var(--bg-card); border: 1px solid #30363d; 
            border-radius: 3px; padding: 2px 8px; align-items: center; position: relative; height: 28px;
            overflow: hidden; transition: height 0.2s;
        }
        .note-strip-card.expanded { height: auto; min-height: 100px; padding: 6px 8px; }
        
        /* 🔀 手柄现在是多功能中心 */
        .drag-handle { 
            color: var(--accent-color); padding: 4px; font-size: 12px; cursor: grab;
            display: flex; align-items: center; justify-content: center; width: 20px;
        }
        .drag-handle:active { cursor: grabbing; }

        /* 左侧标题控制区 */
        .strip-header-group { display: flex; gap: 8px; align-items: center; width: 220px; flex-shrink: 0; }
        .strip-title-field { font-size: 13px; font-weight: bold; background: none; border: none; outline: none; width: 140px; }
        
        /* 垃圾桶：靠在标题右侧 */
        .strip-del-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 11px; }
        .strip-del-btn:hover { color: var(--accent-danger); }

        /* 代码区域 */
        .editor-wrapper { flex: 1; min-width: 0; position: relative; height: 22px; }
        .note-strip-card.expanded .editor-wrapper { height: auto; }
        .strip-content-editor { width: 100%; height: 22px; background: transparent; color: transparent !important; caret-color: #fff; outline: none; font-size: 13px; white-space: nowrap; overflow: hidden; }
        .note-strip-card.expanded .strip-content-editor { height: auto; white-space: pre-wrap; word-break: break-all; color: #e6edf3 !important; }
        .code-highlight-layer { position: absolute; top: 0; left: 0; width: 100%; font-size: 13px; line-height: 22px; white-space: nowrap; pointer-events: none; color: #e6edf3; }
        .note-strip-card.expanded .code-highlight-layer { white-space: pre-wrap; word-break: break-all; }
        
        .lua-kw { color: #ff79c6; } .lua-macro { color: #ff5555; } .lua-func { color: #50fa7b; }
    </style>
</head>
<body>
    <div class="note-stream-list" id="note-stream-container"></div>

    <script>
        let noteItems = [];
        const token = localStorage.getItem('nav_token');

        function renderStream() {
            const container = document.getElementById('note-stream-container');
            container.innerHTML = '';
            noteItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'note-strip-card';
                card.id = `card-${index}`;
                card.innerHTML = `
                    <div class="drag-handle" draggable="true" onclick="toggleExpand(${index})"><i class="fas fa-bars"></i></div>
                    <div class="strip-header-group">
                        <input class="strip-title-field" value="${item.data.title || ''}" onchange="noteItems[${index}].data.title=this.value">
                        <button class="strip-del-btn" onclick="del(${item.id}, ${index})"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div class="editor-wrapper">
                        <div class="strip-content-editor" contenteditable="true" onblur="noteItems[${index}].data.content=this.innerText;refresh(${index})" onpaste="handlePaste(event)">${item.data.content || ''}</div>
                        <div class="code-highlight-layer" id="hl-${index}">${applyHighlight(item.data.content || '')}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleExpand(index) {
            document.getElementById(`card-${index}`).classList.toggle('expanded');
        }

        // ... (保持原有的 applyHighlight, handlePaste, sync, del 等逻辑不变)
        function applyHighlight(text) {
            let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            html = html.replace(/\b(local|if|then|end|and|or)\b/g, '<span class="lua-kw">$1</span>');
            html = html.replace(/(\/click|\/cast|\/use|\/run)\b/g, '<span class="lua-macro">$1</span>');
            return html;
        }

        function handlePaste(e) {
            e.preventDefault();
            const text = e.clipboardData.getData('text/plain');
            document.execCommand("insertText", false, text);
        }

        function refresh(i) {
            document.getElementById('hl-'+i).innerHTML = applyHighlight(noteItems[i].data.content);
        }

        // ... (其余 syncStreamToD1, initDragAndDropEngine 逻辑保持不变)
    </script>
</body>
</html>
