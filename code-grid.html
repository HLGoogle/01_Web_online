<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Stream Canvas // 流式记事终端</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d1117; --bg-card: #161b22; --accent-color: #58a6ff; --accent-danger: #f85149; --text-muted: #8b949e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }
        body { background-color: var(--bg-main); color: #c9d1d9; padding: 10px; }
        
        .toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
        .ctrl-btn { background: transparent; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 12px; font-size: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .ctrl-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
        
        .note-stream-list { display: flex; flex-direction: column; gap: 4px; }
        .note-strip-card { 
            display: flex; gap: 8px; background: var(--bg-card); border: 1px solid #30363d; 
            border-radius: 3px; padding: 0 8px; align-items: center; height: 32px; overflow: hidden;
            transition: height 0.2s;
        }
        .note-strip-card.expanded { height: auto; min-height: 80px; padding: 8px; }
        
        /* 🎯 左侧控制组：统一管理手柄、标题、展开、删除 */
        .strip-header-group { 
            display: flex; gap: 6px; align-items: center; width: 280px; flex-shrink: 0;
            border-right: 1px solid #30363d; padding-right: 8px;
        }
        .drag-handle { color: var(--text-muted); cursor: grab; font-size: 12px; }
        .strip-title-field { font-size: 13px; font-weight: bold; background: none; border: none; outline: none; width: 140px; }
        
        /* 按钮组 */
        .toggle-expand-btn { background: none; border: 1px solid #30363d; color: var(--text-muted); width: 20px; height: 20px; border-radius: 3px; cursor: pointer; font-size: 10px; }
        .strip-del-btn { background: none; border: none; color: #444; cursor: pointer; margin-left: auto; } /* ⚡ margin-left: auto 把垃圾桶顶到该组最右侧 */
        .strip-del-btn:hover { color: var(--accent-danger); }
        
        /* 代码显示区 */
        .editor-wrapper { flex: 1; min-width: 0; position: relative; height: 22px; }
        .note-strip-card.expanded .editor-wrapper { height: auto; }
        .strip-content-editor { width: 100%; height: 22px; background: transparent; color: transparent !important; caret-color: #fff; outline: none; font-size: 13px; white-space: nowrap; overflow: hidden; position: relative; z-index: 2; }
        .note-strip-card.expanded .strip-content-editor { height: auto; white-space: pre-wrap; word-break: break-all; color: #e6edf3 !important; }
        .code-highlight-layer { position: absolute; top: 0; left: 0; width: 100%; font-size: 13px; line-height: 22px; white-space: nowrap; pointer-events: none; z-index: 1; color: #e6edf3; }
        .note-strip-card.expanded .code-highlight-layer { white-space: pre-wrap; word-break: break-all; }
        
        .lua-kw { color: #ff79c6; font-weight: bold; } .lua-macro { color: #ff5555; } .lua-func { color: #50fa7b; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="ctrl-btn" onclick="addNewNoteStrip()">新增记事</button>
        <button class="ctrl-btn" onclick="syncStreamToD1()">同步云端</button>
    </div>
    <div class="note-stream-list" id="note-stream-container"></div>
    <script>
        let noteItems = [];
        const token = localStorage.getItem('nav_token');

        async function fetchStreamData() {
            const res = await fetch('/api/code-grid', { headers: {'Authorization': `Bearer ${token}`} });
            const result = await res.json();
            noteItems = result.rows || [];
            renderStream();
        }

        function renderStream() {
            const container = document.getElementById('note-stream-container');
            container.innerHTML = '';
            noteItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'note-strip-card';
                card.id = `card-${index}`;
                card.innerHTML = `
                    <div class="strip-header-group">
                        <div class="drag-handle" draggable="true"><i class="fas fa-bars"></i></div>
                        <input class="strip-title-field" style="color:${item.data.title_color||'#58a6ff'}" value="${item.data.title||''}" onchange="noteItems[${index}].data.title=this.value">
                        <button class="toggle-expand-btn" onclick="document.getElementById('card-${index}').classList.toggle('expanded')">＋</button>
                        <button class="strip-del-btn" onclick="del(${item.id}, ${index})"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div class="editor-wrapper">
                        <div class="strip-content-editor" contenteditable="true" onblur="noteItems[${index}].data.content=this.innerText;refresh(${index})" onpaste="handlePaste(event)">${item.data.content||''}</div>
                        <div class="code-highlight-layer" id="hl-${index}">${applyHighlight(item.data.content||'')}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function applyHighlight(text) {
            let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            html = html.replace(/\b(local|if|then|end|and|or)\b/g, '<span class="lua-kw">$1</span>');
            html = html.replace(/(\/click|\/cast|\/use|\/run)\b/g, '<span class="lua-macro">$1</span>');
            return html;
        }

        function handlePaste(e) { e.preventDefault(); document.execCommand("insertText", false, e.clipboardData.getData('text/plain')); }
        function refresh(i) { document.getElementById('hl-'+i).innerHTML = applyHighlight(noteItems[i].data.content); }
        function addNewNoteStrip() { noteItems.unshift({ id: null, data: { title: '新记事', content: '' } }); renderStream(); }
        async function syncStreamToD1() {
            for (let item of noteItems) { await fetch('/api/code-grid', { method: 'POST', headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'}, body: JSON.stringify(item) }); }
            alert("同步完成");
        }
        async function del(id, i) { if(confirm('确认删除？')) { if(id) await fetch('/api/code-grid', { method: 'DELETE', headers: {'Authorization': `Bearer ${token}`}, body: JSON.stringify({id}) }); noteItems.splice(i, 1); renderStream(); } }
        
        fetchStreamData();
    </script>
</body>
</html>
